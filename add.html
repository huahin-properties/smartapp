<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Master Asset | Auto-Pilot V9.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

  <style>
    :root { --brand: #262626; --accent: #C9A84C; --bg: #F8FAF8; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: #1A3017; margin: 0; padding: 0; }
    header { position: fixed; top: 0; width: 100%; height: 60px; background: white; z-index: 1000; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
    .brand-center { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 800; color: var(--accent); font-family: 'Montserrat'; text-transform: uppercase; font-size: 0.9rem; }
    .content-wrapper { padding: 80px 15px 150px; max-width: 1000px; margin: 0 auto; }
    
    .edit-banner { background: var(--brand); border-radius: 0.8rem; padding: 15px 20px; color: white; margin-bottom: 20px; }
    .input-card { background: white; border: 1px solid rgba(0,0,0,0.05); padding: 1.5rem; border-radius: 1.2rem; margin-bottom: 1.2rem; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
    .field-label { font-size: 10px; font-weight: 800; color: #999; text-transform: uppercase; margin-bottom: 0.5rem; display: block; font-family: 'Montserrat'; }
    .field-label span { color: #2D5A27; font-size: 11px; margin-left: 10px; font-weight: 700; border-left: 2px solid #eee; padding-left: 10px; font-family: 'Sarabun'; }
    .field-input { width: 100%; background: #F9F9F8; border: 1.5px solid transparent; border-radius: 0.8rem; padding: 0.9rem; font-size: 14px; outline: none; transition: 0.3s; }
    .field-input:focus { border-color: var(--accent); background: white; }

    /* Modal Styles */
    .project-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 1.5rem; max-height: 70vh; overflow-y: auto; padding: 20px; }
    .project-opt { padding: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-weight: 700; }
    .project-opt:active { color: var(--accent); }

    .img-tile { position: relative; aspect-ratio: 1; border-radius: 0.8rem; overflow: hidden; background: #eee; }
    .img-x { position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; background: #EF4444; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; border: 2px solid white; z-index: 5; }
    .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #eee; padding: 15px; z-index: 1000; text-align: center; }
    .btn-update { background: #111; color: white; width: 100%; max-width: 500px; height: 50px; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; }
  </style>
</head>
<body>

  <div class="project-modal" id="pModal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div style="font-weight:800; font-size:12px; color:var(--accent); margin-bottom:15px; display:flex; justify-content:space-between;">
        <span>SELECT PROJECT</span><i class="fas fa-times" onclick="document.getElementById('pModal').style.display='none'"></i>
      </div>
      <div id="modal-list"></div>
    </div>
  </div>

  <header>
    <div style="width:40px;"></div>
    <div class="brand-center">New Master Asset</div>
    <div style="width:40px;"></div>
  </header>

  <div class="content-wrapper">
    <div class="edit-banner">
      <div style="font-size:8px; font-weight:800; color:rgba(255,255,255,0.4); text-transform:uppercase;">Master Vault | Auto-Pilot</div>
      <div style="font-size:1rem; font-weight:800; font-family:'Montserrat';">ADD NEW PROPERTY</div>
    </div>

    <div class="flex gap-6 border-bottom border-gray-200 mb-6 overflow-x-auto">
      <button class="pb-2 border-b-2 border-amber-500 font-800 text-[10px] text-amber-600 uppercase">Visuals & Specs</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
      <div class="input-card">
        <label class="field-label">Thumbnail <span>รูปหน้าปก</span></label>
        <div id="thumbPreview" class="w-full aspect-video rounded-xl border-2 border-dashed border-gray-200 flex items-center justify-center overflow-hidden mb-3">
          <i class="fas fa-cloud-upload-alt text-2xl text-gray-200"></i>
        </div>
        <button onclick="document.getElementById('f_thumb').click()" class="w-full py-3 bg-blue-600 text-white rounded-xl text-[11px] font-800 uppercase">Upload Cover</button>
        <input type="file" id="f_thumb" class="hidden" onchange="handleMedia(this, 'thumb')">
      </div>
      <div class="input-card">
        <label class="field-label">Album <span>อัลบั้มรูป</span></label>
        <div id="albumPreview" class="h-[120px] bg-gray-50 rounded-xl p-2 grid grid-cols-4 gap-2 overflow-y-auto mb-3"></div>
        <button onclick="document.getElementById('f_album').click()" class="w-full py-3 bg-purple-600 text-white rounded-xl text-[11px] font-800 uppercase">Add Images</button>
        <input type="file" id="f_album" class="hidden" multiple onchange="handleMedia(this, 'album')">
      </div>
    </div>

    <div class="input-card grid grid-cols-1 md:grid-cols-3 gap-6">
      <div><label class="field-label">1. HP_ID</label><input id="HP_ID" class="field-input !bg-amber-50 font-800" readonly></div>
      <div><label class="field-label">2. Listing Type <span>ประกาศ</span></label><select id="Listing_Type" class="field-input dynamic-opt"></select></div>
      <div><label class="field-label">3. Asset Type <span>ประเภท</span></label><select id="Type" class="field-input dynamic-opt"></select></div>
      
      <div>
        <label class="field-label">4. Project Name <span>ชื่อโครงการ</span></label>
        <div class="relative">
          <input id="Project_Name" class="field-input font-700" placeholder="พิมพ์ใหม่หรือกดเลือก...">
          <div onclick="document.getElementById('pModal').style.display='flex'" class="absolute right-2 top-2 bg-black text-white w-8 h-8 rounded-lg flex items-center justify-center cursor-pointer">
            <i class="fas fa-list-ul text-xs"></i>
          </div>
        </div>
      </div>

      <div><label class="field-label">5. Plot <span>หมายเลขแปลง</span></label><input id="Plot" class="field-input"></div>
      <div><label class="field-label">6. Sales Status <span>สถานะ</span></label><select id="Status" class="field-input dynamic-opt"></select></div>

      <div class="col-span-full grid grid-cols-1 md:grid-cols-3 gap-4 p-5 bg-gray-50 rounded-2xl border">
        <div><label class="field-label">7. Sale Price</label><input type="number" id="Sale_Price" class="field-input !bg-white" oninput="runCalc()"></div>
        <div><label class="field-label">8. Living Area</label><input type="number" id="Living_Area_sq_m" class="field-input !bg-white" oninput="runCalc()"></div>
        <div><label class="field-label">9. Price/m2</label><input id="Price_sq_m" class="field-input font-800 text-green-700" readonly value="0"></div>
      </div>

      <div><label class="field-label">16. District <span>อำเภอ</span></label><select id="District" class="field-input dynamic-opt"></select></div>
      <div><label class="field-label">17. Sub-District <span>ตำบล</span></label><select id="SubDistrict" class="field-input dynamic-opt"></select></div>
      <div><label class="field-label">36. Coordinates <span>พิกัด</span></label><input id="Coordinates" class="field-input" placeholder="ระบบจะดึงให้อัตโนมัติ"></div>
      
      <div class="col-span-full"><label class="field-label">37. Description</label><textarea id="Description" rows="4" class="field-input"></textarea></div>
    </div>
  </div>

  <div class="save-bar"><button id="btn_save" onclick="saveData()" class="btn-update shadow-xl">Publish Master Asset</button></div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    const firebaseConfig = { storageBucket: "huahin-properties-5f1b5.firebasestorage.app" };
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();

    let projectMaster = [], galleryArr = [], thumbUrl = "";

    async function init() {
      const res = await (await fetch(API, { method:'POST', body: JSON.stringify({ mode: 'getAddContext' }) })).json();
      if (res.ok) {
        document.getElementById('HP_ID').value = res.nextId;
        projectMaster = res.options._raw_projects;
        
        // Auto-Discovery: เติมตัวเลือก Dropdown ทั้งหมด
        Object.keys(res.options).forEach(key => {
          const el = document.getElementById(key);
          if (el && el.tagName === "SELECT") {
            el.innerHTML = '<option value="">-- Select --</option>' + res.options[key].map(v => `<option value="${v}">${v}</option>`).join('');
          }
        });

        // สร้าง Modal List
        document.getElementById('modal-list').innerHTML = projectMaster.map(p => `<div class="project-opt" onclick="autoFill('${p.name}')">${p.name}</div>`).join('');
      }
    }

    // 🎯 หัวใจหลัก: Auto-Fill เมื่อเลือกโครงการ
    function autoFill(name) {
      const p = projectMaster.find(item => item.name === name);
      if (p) {
        document.getElementById('Project_Name').value = p.name;
        if(p.district) document.getElementById('District').value = p.district;
        if(p.subdistrict) document.getElementById('SubDistrict').value = p.subdistrict;
        if(p.coordinates) document.getElementById('Coordinates').value = p.coordinates;
      }
      document.getElementById('pModal').style.display = 'none';
    }

    async function handleMedia(input, target) {
      const hpId = document.getElementById('HP_ID').value;
      for (let f of input.files) {
        const path = `properties/${hpId}/${Date.now()}_${f.name}`;
        const ref = storage.ref(path);
        await ref.put(f);
        const url = await ref.getDownloadURL();
        if(target === 'thumb') { thumbUrl = url; renderThumb(url); }
        else { galleryArr.push(url); renderAlbum(); }
      }
    }

    function renderThumb(url) { document.getElementById('thumbPreview').innerHTML = `<img src="${url}" class="w-full h-full object-cover">`; }
    function renderAlbum() { document.getElementById('albumPreview').innerHTML = galleryArr.map(url => `<div class="img-tile"><img src="${url}" class="w-full h-full object-cover"></div>`).join(''); }

    function runCalc() {
      const p = parseFloat(document.getElementById('Sale_Price').value) || 0;
      const a = parseFloat(document.getElementById('Living_Area_sq_m').value) || 1;
      document.getElementById('Price_sq_m').value = Math.round(p/a).toLocaleString();
    }

    async function saveData() {
      if(!confirm("Publish?")) return;
      let data = { mode: 'addUnit', Thumbnail_Image: thumbUrl, Album_Image: galleryArr.join(',') };
      document.querySelectorAll('input, select, textarea').forEach(el => { if(el.id) data[el.id] = el.value; });
      const res = await (await fetch(API, { method:'POST', body: JSON.stringify(data) })).json();
      if(res.ok) { alert("Success!"); location.reload(); }
    }

    window.onload = init;
  </script>
</body>
</html>

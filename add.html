<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Master Asset | Zero Wait Engine V3.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --brand: #262626; --accent: #C9A84C; --bg: #F8FAF8; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: #1A3017; margin: 0; padding: 0; }
    .content-wrapper { padding: 20px 20px 200px; max-width: 1240px; margin: 0 auto; }
    .tab-bar { display: flex; gap: 2rem; margin-bottom: 2rem; border-bottom: 2px solid #eee; }
    .tab-btn { padding: 1rem 0; font-weight: 800; font-size: 11px; text-transform: uppercase; color: #999; cursor: pointer; position: relative; background: none; border: none; transition: 0.3s; }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background: var(--accent); border-radius: 10px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .input-card { background: white; border: 1px solid rgba(0,0,0,0.05); padding: 2.2rem; border-radius: 2.2rem; margin-bottom: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.02); }
    .field-label { font-size: 11px; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 0.6rem; display: block; letter-spacing: 0.5px; }
    .field-label span { color: #2D5A27; font-size: 12px; margin-left: 10px; font-weight: 700; border-left: 2px solid #ddd; padding-left: 10px; }
    .field-input { width: 100%; background: #F9F9F8; border: 1.5px solid transparent; border-radius: 1rem; padding: 1rem; font-size: 15px; outline: none; transition: 0.3s; }
    .field-input:focus { border-color: var(--brand); background: white; }
    .field-input[readonly] { background: #f0f2f0; color: #2D5A27; font-weight: 700; }
    .img-tile { position: relative; aspect-ratio: 1; border-radius: 1rem; overflow: hidden; border: 1px solid #eee; }
    .img-x { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background: rgba(239,68,68,0.9); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; border: 2px solid white; font-size: 10px; }
    .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.98); border-top: 1px solid #eee; padding: 25px 20px; z-index: 1000; text-align: center; }
    .btn-update { background: var(--brand); color: white; width: 100%; max-width: 800px; height: 70px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 20px; }
    
    /* 🎯 สไตล์ใหม่: ตัวบอกสถานะอัปโหลดแบบไม่บังหน้าจอ */
    .mini-status { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); display: none; margin-top: 5px; }
    .mini-status.active { display: flex; align-items: center; gap: 5px; }
  </style>
</head>
<body>
  <div class="content-wrapper">
    <div class="bg-[#262626] rounded-[2.5rem] p-10 text-white flex justify-between items-center mb-8 shadow-2xl relative overflow-hidden">
      <div class="relative z-10"><p class="text-white/60 font-800 uppercase tracking-widest text-[10px] mb-2">Master Vault | Enrollment Suite</p><h1 class="text-4xl font-800 tracking-tighter italic Sarabun uppercase">ADD NEW MASTER ASSET</h1></div>
    </div>
    <div class="tab-bar">
      <button id="btn-photo" class="tab-btn active" onclick="switchTab('photo')">Visual Assets</button>
      <button id="btn-info" class="tab-btn" onclick="switchTab('info')">Specifications (38 Items)</button>
    </div>

    <div id="tab-photo" class="tab-content active space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="input-card">
          <span class="field-label">Main Image <span>รูปภาพหน้าปก</span></span>
          <div id="thumbPreview" class="w-full aspect-video rounded-2xl bg-slate-50 border-2 border-dashed border-slate-200 flex items-center justify-center overflow-hidden"><i class="fas fa-cloud-upload-alt text-4xl text-slate-200"></i></div>
          <button id="btn_thumb" onclick="document.getElementById('file_thumb').click()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-800 mt-4 text-xs">UPLOAD COVER</button>
          <div id="status_thumb" class="mini-status"><i class="fas fa-circle-notch animate-spin"></i> Syncing Cover...</div>
          <input type="file" id="file_thumb" class="hidden" accept="image/*" onchange="handleUpload(this, 'thumb')"><input type="hidden" id="Thumbnail_Image">
        </div>
        <div class="input-card">
          <span class="field-label">Visual Gallery <span>อัลบั้มรูปภาพ</span></span>
          <div id="galleryPreview" class="h-48 bg-slate-50 rounded-2xl p-3 grid grid-cols-4 gap-2 overflow-y-auto mb-3"></div>
          <button id="btn_album" onclick="document.getElementById('file_gallery').click()" class="w-full py-4 bg-purple-600 text-white rounded-xl font-800 text-xs">ADD VISUALS</button>
          <div id="status_album" class="mini-status"><i class="fas fa-circle-notch animate-spin"></i> Syncing Album...</div>
          <input type="file" id="file_gallery" class="hidden" multiple accept="image/*" onchange="handleUpload(this, 'album')"><input type="hidden" id="Album_Image">
        </div>
      </div>
      <div class="input-card">
        <span class="field-label">Master Documents (PDF) <span>จัดการไฟล์เอกสาร</span></span>
        <div class="space-y-3 mt-4">
          <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-xl">
             <i class="fas fa-file-pdf text-red-500"></i>
             <span class="text-xs font-800 text-slate-400">FLOOR PLAN SYNC</span>
             <button onclick="document.getElementById('f_floor').click()" class="ml-auto bg-slate-200 p-2 rounded-lg"><i class="fas fa-upload"></i></button>
             <input type="file" id="f_floor" class="hidden" accept=".pdf" onchange="handleUpload(this, 'floor', 'FloorPlan_PDF')">
             <input type="hidden" id="FloorPlan_PDF">
          </div>
        </div>
      </div>
    </div>

    <div id="tab-info" class="tab-content space-y-6">
      <div class="input-card grid grid-cols-1 md:grid-cols-3 gap-8">
        <div><label class="field-label">1. HP_ID</label><input id="HP_ID" class="field-input font-800" readonly></div>
        <div><label class="field-label">2. Listing Type</label><select id="Listing_Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">3. Asset Category</label><select id="Type" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">4. Project Name</label><select id="Project_Name" class="field-input dynamic-opt"></select></div>
        <div><label class="field-label">5. Plot Reference</label><input id="Plot" class="field-input"></div>
        <div><label class="field-label">6. Sales Status</label><select id="Status" class="field-input dynamic-opt"></select></div>
        <div class="col-span-full grid grid-cols-1 md:grid-cols-3 gap-8 p-8 rounded-[2.5rem] bg-[#F9F9F8] border-2 border-[#eee]">
          <div><label class="field-label">7. Sale Price</label><input type="number" id="Sale_Price" class="field-input" oninput="runCalc()"></div>
          <div><label class="field-label">8. Living Area</label><input type="number" id="Living_Area_sq_m" class="field-input" oninput="runCalc()"></div>
          <div><label class="field-label">9. Price/m2</label><input type="number" id="Price_sq_m" class="field-input" readonly></div>
        </div>
        </div>
    </div>
  </div>
  <div class="save-bar"><button id="btn_save" onclick="saveData()" class="btn-update shadow-2xl">PUBLISH MASTER ASSET</button></div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    let gallery = [], thumbUrl = "", currentHpId = "MASTER_ENTRY", pdfData = {};

    // ⚡ Silent Init: ดึงข้อมูลเบื้องหลังโดยไม่บังหน้าจอ
    async function init() {
      try {
        const res = await (await fetch(API, { method:'POST', body: JSON.stringify({ mode: 'getMetadata' }) })).json();
        if (res.ok) {
          const meta = res.data;
          document.querySelectorAll('select.dynamic-opt').forEach(el => {
            const options = meta[el.id] || [];
            if (options.length > 0) el.innerHTML = `<option value="">-- Select --</option>` + options.map(v => `<option value="${v}">${v}</option>`).join('');
          });
        }
      } catch (e) { console.error("Background Metadata Fetch Failed"); }
    }

    async function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 1200; 
            let width = img.width, height = img.height;
            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
          };
        };
      });
    }

    // 🚀 THE FACEBOOK STRATEGY: NO GLOBAL LOADING
    async function handleUpload(input, target, fieldId) {
      if(!input.files.length) return;
      
      // แสดงสถานะเล็กๆ ที่ปุ่มแทนการหมุนบังหน้าจอ
      const statusEl = document.getElementById(`status_${target}`);
      if(statusEl) statusEl.classList.add('active');

      const uploadTasks = Array.from(input.files).map(async (f) => {
        let base64 = f.type.includes("image") ? await compressImage(f) : await new Promise(res => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result.split(',')[1]); });

        const res = await (await fetch(API, { 
          method:'POST', 
          body: JSON.stringify({ mode:'uploadFile', target, hpId: currentHpId, data: base64, type: f.type, name: f.name }) 
        })).json();

        return { res, target, fieldId };
      });

      try {
        const results = await Promise.all(uploadTasks);
        results.forEach(({res, target, fieldId}) => {
          if (res.ok) {
            currentHpId = res.newId; 
            document.getElementById('HP_ID').value = currentHpId;
            if (target === 'thumb') { 
              thumbUrl = res.url; 
              document.getElementById('thumbPreview').innerHTML = `<img src="${res.url}" loading="lazy" class="w-full h-full object-cover">`; 
              document.getElementById('Thumbnail_Image').value = res.url; 
            }
            else if (target === 'album') { gallery.push(res.url); }
            else if (fieldId) { pdfData[fieldId] = res.url; document.getElementById(fieldId).value = res.url; }
          }
        });
        if (target === 'album') renderGallery();
      } finally {
        if(statusEl) statusEl.classList.remove('active');
      }
    }

    function renderGallery() {
      const box = document.getElementById('galleryPreview');
      box.innerHTML = gallery.map((url, i) => `<div class="img-tile"><img src="${url}" loading="lazy" class="w-full h-full object-cover"></div>`).join('');
      document.getElementById('Album_Image').value = gallery.join(',');
    }

    function runCalc() {
      const price = parseFloat(document.getElementById('Sale_Price').value) || 0;
      const area = parseFloat(document.getElementById('Living_Area_sq_m').value) || 0;
      if (area > 0) document.getElementById('Price_sq_m').value = Math.round(price / area);
    }

    async function saveData() {
      if(!confirm("Submit this Master Entry?")) return;
      document.getElementById('btn_save').innerText = "SYNCING TO MASTER DATABASE...";
      const p = { mode: "addUnit", HP_ID: currentHpId, Thumbnail_Image: thumbUrl, Album_Image: gallery.join(',') };
      document.querySelectorAll('input, select, textarea').forEach(el => { if(el.id) p[el.id] = el.value; });
      const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(p) })).json();
      if(res.ok) { alert(`SUCCESS! ASSET ID: ${res.newId} ✅`); location.href='dashboard.html'; }
    }

    function switchTab(t) {
      document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      document.getElementById('btn-' + (t === 'photo' ? 'photo' : 'info')).classList.add('active');
    }
    window.onload = init;
  </script>
</body>
</html>

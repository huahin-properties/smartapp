<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add New Master Asset | HUA HIN PROPERTIES</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

  <style>
    :root { --brand: #262626; --accent: #C9A84C; --bg: #F8FAF8; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: #1A3017; margin: 0; padding: 0; overflow-x: hidden; }
    header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
    .brand-center { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 800; color: var(--accent); font-size: 0.95rem; text-transform: uppercase; font-family: 'Montserrat'; }
    .content-wrapper { padding: 80px 15px 200px; max-width: 1100px; margin: 0 auto; }
    .edit-banner { background: #262626; border-radius: 0.8rem; padding: 15px 20px; color: white; margin-bottom: 20px; }
    .input-card { background: white; border: 1px solid rgba(0,0,0,0.05); padding: 1.5rem; border-radius: 1.2rem; margin-bottom: 1.2rem; box-shadow: 0 5px 20px rgba(0,0,0,0.02); }
    .field-label { font-size: 10px; font-weight: 800; color: #999; text-transform: uppercase; margin-bottom: 0.6rem; display: block; font-family: 'Montserrat'; }
    .field-label span { color: #2D5A27; font-size: 11px; margin-left: 10px; font-weight: 700; border-left: 2px solid #eee; padding-left: 10px; font-family: 'Sarabun'; }
    .field-input { width: 100%; background: #F9F9F8; border: 1.5px solid transparent; border-radius: 0.8rem; padding: 0.9rem 1.1rem; font-size: 14px; outline: none; transition: 0.3s; color: #1A3017; }
    .field-input:focus { border-color: var(--accent); background: white; }

    .img-tile { position: relative; aspect-ratio: 1; border-radius: 0.8rem; overflow: hidden; border: 1px solid #eee; background: #eee; }
    .img-x { position: absolute; top: 6px; right: 6px; width: 24px; height: 24px; border-radius: 50%; background: #EF4444; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; border: 2px solid white; font-size: 10px; font-weight: 800; }
    .btn-blue { background: #2563eb; color: white; width: 100%; padding: 12px; border-radius: 0.8rem; font-weight: 800; font-size: 11px; text-transform: uppercase; font-family: 'Montserrat'; cursor: pointer; border: none; }
    .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.98); border-top: 1px solid #eee; padding: 15px 20px; z-index: 1000; text-align: center; }
    .btn-update { background: #111; color: white; width: 100%; max-width: 600px; height: 55px; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; }

    .project-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 1.5rem; max-height: 70vh; overflow-y: auto; padding: 20px; }
    .project-opt { padding: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-weight: 700; color: #1A3017; }
    
    .ownership-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px; }
    .own-item { display: flex; align-items: center; gap: 10px; background: #F9F9F8; padding: 12px 15px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .pdf-row { display: flex; align-items: center; gap: 1rem; background: #F9F9F8; padding: 12px 18px; border-radius: 1.2rem; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div class="project-modal" id="pModal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div style="font-weight:800; font-size:12px; color:var(--accent); margin-bottom:15px; display:flex; justify-content:space-between; font-family: 'Montserrat';">
        <span>SELECT PROJECT</span><i class="fas fa-times" onclick="document.getElementById('pModal').style.display='none'"></i>
      </div>
      <div id="modal-list"></div>
    </div>
  </div>

  <header>
    <div onclick="history.back()" style="cursor:pointer; color:var(--accent);"><i class="fas fa-chevron-left"></i></div>
    <div class="brand-center">New Master Asset</div>
    <div style="width:20px;"></div>
  </header>

  <div class="content-wrapper">
    <div class="edit-banner">
      <div style="font-size:8px; font-weight:800; color:rgba(255,255,255,0.4); text-transform:uppercase; font-family:'Montserrat';">Auto-Pilot V10.1 | Smart Cluster Sync</div>
      <div style="font-size:1rem; font-weight:800; font-family:'Montserrat';">ADD NEW PROPERTY</div>
    </div>

    <div class="tab-bar">
      <button id="btn-photo" class="tab-btn active" onclick="switchTab('photo')">Visual Assets</button>
      <button id="btn-info" class="tab-btn" onclick="switchTab('info')">Specifications</button>
    </div>

    <div id="tab-photo" class="tab-content active space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="input-card">
          <span class="field-label">Main Image Cover <span>รูปภาพหน้าปก</span></span>
          <div id="thumbPreview" class="relative w-full aspect-video rounded-xl bg-slate-50 border-2 border-dashed border-slate-200 flex items-center justify-center overflow-hidden mb-4">
            <i class="fas fa-cloud-upload-alt text-3xl text-slate-200"></i>
          </div>
          <button onclick="document.getElementById('f_thumb').click()" class="btn-blue py-3">Upload Cover</button>
          <input type="file" id="f_thumb" class="hidden" accept="image/*" onchange="handleMediaUpload(this, 'thumb')"><input type="hidden" id="Thumbnail_Image">
        </div>
        <div class="input-card">
          <span class="field-label">Visual Gallery <span>อัลบั้มรูปภาพ</span></span>
          <div id="galleryPreview" class="h-48 bg-slate-50 rounded-xl p-3 grid grid-cols-4 gap-2 overflow-y-auto mb-4"></div>
          <button onclick="document.getElementById('f_gallery').click()" class="w-full py-3 bg-purple-600 text-white rounded-xl font-800 text-[11px] uppercase">Add Images</button>
          <input type="file" id="f_gallery" class="hidden" multiple onchange="handleMediaUpload(this, 'album')"><input type="hidden" id="Album_Image">
        </div>
      </div>
      <div class="input-card">
        <span class="field-label">Master Documents (PDF)</span>
        <div class="pdf-row">
           <div class="flex-1 font-800 text-[10px] text-slate-400">FLOOR PLAN: <span id="txt-FloorPlan_PDF" class="text-slate-700">None</span></div>
           <button onclick="document.getElementById('f_floor').click()" class="bg-blue-600 text-white p-2 rounded"><i class="fas fa-upload"></i></button>
           <input type="file" id="f_floor" class="hidden" onchange="handleMediaUpload(this, 'pdf', 'FloorPlan_PDF')"><input type="hidden" id="FloorPlan_PDF">
        </div>
      </div>
    </div>

    <div id="tab-info" class="tab-content space-y-6">
      <div class="input-card grid grid-cols-1 md:grid-cols-3 gap-8">
        <div><label class="field-label">1. HP_ID <span>รหัสทรัพย์สิน</span></label><input id="HP_ID" class="field-input !bg-amber-50 font-800" readonly></div>
        
        <div>
          <label class="field-label">2. Project Name <span>ชื่อโครงการ</span></label>
          <div class="relative flex items-center">
            <input id="Project_Name" class="field-input font-700" placeholder="Type or Select...">
            <div onclick="document.getElementById('pModal').style.display='flex'" class="absolute right-2 bg-black text-white w-8 h-8 rounded flex items-center justify-center cursor-pointer"><i class="fas fa-list-ul text-xs"></i></div>
          </div>
        </div>

        <div><label class="field-label">3. Listing Type <span>ประกาศ</span></label><select id="Listing_Type" class="field-input"></select></div>
        <div><label class="field-label">4. Asset Type <span>ประเภท</span></label><select id="Type" class="field-input"></select></div>
        <div><label class="field-label">5. Plot <span>หมายเลขแปลง</span></label><input id="Plot" class="field-input" placeholder="เช่น m39"></div>
        <div><label class="field-label">6. Sales Status <span>สถานะขาย</span></label><select id="Status" class="field-input"></select></div>

        <div class="col-span-full grid grid-cols-1 md:grid-cols-3 gap-6 p-6 bg-gray-50 rounded-xl">
           <div><label class="field-label">7. Sale Price</label><input type="number" id="Sale_Price" class="field-input !bg-white" oninput="runCalc()"></div>
           <div><label class="field-label">8. Living Area (m2)</label><input type="number" id="Living_Area_sq_m" class="field-input !bg-white" oninput="runCalc()"></div>
           <div><label class="field-label">9. Price/m2</label><input id="Price_sq_m" class="field-input bg-slate-100 font-800" readonly value="0"></div>
           <div class="col-span-full border-t border-gray-200 pt-4 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div><label class="field-label">10. Common Fee Rate</label><input type="number" id="Common_Fee_Rate" class="field-input !bg-white" oninput="runCalc()"></div>
            <div><label class="field-label">11. Monthly Fee</label><input id="Monthly_Common_Fee" class="field-input" readonly value="0"></div>
            <div><label class="field-label">12. Yearly Fee</label><input id="Common_Fee_Yearly" class="field-input" readonly value="0"></div>
          </div>
        </div>

        <div><label class="field-label">13. Land Area (m2)</label><input type="number" id="Land_Area_sq_m" class="field-input"></div>
        <div><label class="field-label">14. Land Area (sq.w)</label><input type="number" id="Land_Area_sq_w" class="field-input"></div>
        <div><label class="field-label">15. Furnishing</label><select id="Furnishing" class="field-input"></select></div>
        <div><label class="field-label">16. District</label><select id="District" class="field-input"></select></div>
        <div><label class="field-label">17. Sub-District</label><select id="SubDistrict" class="field-input"></select></div>
        <div><label class="field-label">18. Zone</label><select id="Zone" class="field-input"></select></div>
        
        <div><label class="field-label">24. Electricity</label><select id="Electricity" class="field-input"></select></div>
        <div><label class="field-label">29. Water Source</label><select id="Water_Source" class="field-input"></select></div>
        <div><label class="field-label">32. Title Deed</label><select id="Land_Title_Deed_Type" class="field-input"></select></div>
        <div><label class="field-label">36. Coordinates</label><input id="Coordinates" class="field-input"></div>

        <div class="col-span-full">
          <label class="field-label">31. Ownership (Auto-Select)</label>
          <div id="ownership-container" class="ownership-grid"></div>
          <input type="hidden" id="Ownership_Type">
        </div>

        <div class="col-span-full"><label class="field-label">37. Description</label><textarea id="Description" rows="4" class="field-input"></textarea></div>
      </div>
    </div>
  </div>

  <div class="save-bar"><button id="btn_save" onclick="saveData()" class="btn-update shadow-xl">PUBLISH MASTER ASSET</button></div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    const firebaseConfig = { storageBucket: "huahin-properties-5f1b5.firebasestorage.app" };
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();

    let projectMaster = [], galleryArr = [], thumbUrl = "";

    async function init() {
      try {
        const res = await (await fetch(API, { method:'POST', body: JSON.stringify({ mode: 'getAddContext' }) })).json();
        if (res.ok) {
          document.getElementById('HP_ID').value = res.nextId;
          const meta = res.options;
          projectMaster = meta._raw_projects || [];

          const dds = ["Listing_Type", "Type", "Status", "Furnishing", "District", "SubDistrict", "Zone", "Electricity", "Water_Source", "Land_Title_Deed_Type", "System_Status"];
          dds.forEach(id => {
            const el = document.getElementById(id);
            if(el && meta[id]) el.innerHTML = '<option value="">-- Select --</option>' + meta[id].map(v => `<option value="${v}">${v}</option>`).join('');
          });

          if(meta.Ownership_Type) {
            document.getElementById('ownership-container').innerHTML = meta.Ownership_Type.map(opt => `
              <label class="own-item"><input type="checkbox" name="own_check" value="${opt}" class="w-4 h-4 accent-black"> <span>${opt}</span></label>
            `).join('');
          }
          document.getElementById('modal-list').innerHTML = projectMaster.map(p => `<div class="project-opt" onclick="autoFill('${p.name}')">${p.name}</div>`).join('');
        }
      } catch (e) { console.error(e); }
    }

    function autoFill(name) {
      const p = projectMaster.find(item => item.name === name);
      if (p) {
        document.getElementById('Project_Name').value = p.name;
        const fields = ["District", "SubDistrict", "Coordinates", "Zone", "Type", "Water_Source", "Land_Title_Deed_Type"];
        fields.forEach(f => {
          const el = document.getElementById(f);
          if(el && p[f.toLowerCase()]) el.value = p[f.toLowerCase()];
        });
        if(p.ownership_type) {
          const vals = p.ownership_type.split(',').map(s => s.trim());
          document.querySelectorAll('input[name="own_check"]').forEach(cb => { cb.checked = vals.includes(cb.value); });
        }
      }
      document.getElementById('pModal').style.display = 'none';
    }

    async function handleMediaUpload(input, target, fieldId) {
      if(!input.files.length) return;
      const hpId = document.getElementById('HP_ID').value || "NEW";
      for (let file of input.files) {
        const path = `properties/${hpId}/${Date.now()}_${file.name}`;
        const ref = storage.ref(path);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        if(target === 'thumb') { thumbUrl = url; renderThumb(url); }
        else if(target === 'album') { galleryArr.push(url); renderGallery(); }
        else if(fieldId) { document.getElementById(fieldId).value = url; document.getElementById('txt-'+fieldId).innerText = file.name + " ✅"; }
      }
    }

    function renderThumb(url) { document.getElementById('thumbPreview').innerHTML = `<div class="img-x" onclick="removeThumb()">✕</div><img src="${url}" class="w-full h-full object-cover">`; }
    function removeThumb() { thumbUrl = ""; document.getElementById('thumbPreview').innerHTML = '<i class="fas fa-cloud-upload-alt text-3xl"></i>'; }
    function renderGallery() { document.getElementById('galleryPreview').innerHTML = galleryArr.map((url, i) => `<div class="img-tile"><div class="img-x" onclick="removeGallery(${i})">✕</div><img src="${url}" class="w-full h-full object-cover"></div>`).join(''); }
    function removeGallery(i) { galleryArr.splice(i, 1); renderGallery(); }

    function runCalc() {
      const p = parseFloat(document.getElementById('Sale_Price').value) || 0;
      const a = parseFloat(document.getElementById('Living_Area_sq_m').value) || 1;
      const r = parseFloat(document.getElementById('Common_Fee_Rate').value) || 0;
      document.getElementById('Price_sq_m').value = Math.round(p/a).toLocaleString();
      document.getElementById('Monthly_Common_Fee').value = Math.round(a * r).toLocaleString();
      document.getElementById('Common_Fee_Yearly').value = Math.round(a * r * 12).toLocaleString();
    }

    async function saveData() {
      if(!confirm("Confirm Publish?")) return;
      document.getElementById('btn_save').innerText = "SYNCING...";
      const owns = Array.from(document.querySelectorAll('input[name="own_check"]:checked')).map(c => c.value);
      document.getElementById('Ownership_Type').value = owns.join(', ');
      let payload = { mode: "addUnit", Thumbnail_Image: thumbUrl, Album_Image: galleryArr.join(',') };
      document.querySelectorAll('input, select, textarea').forEach(el => { if(el.id) payload[el.id] = el.value; });
      const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(payload) })).json();
      if(res.ok) { alert("SUCCESS! ✅"); location.reload(); }
    }

    function switchTab(t) {
      document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      document.getElementById('btn-' + t).classList.add('active');
    }
    window.onload = init;
  </script>
</body>
</html>

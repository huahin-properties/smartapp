<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Master Asset | HUA HIN PROPERTIES</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

  <style>
    :root { --brand: #262626; --accent: #C9A84C; --bg: #F8FAF8; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: #1A3017; margin: 0; padding: 0; }
    
    header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
    .brand-center { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 800; color: var(--accent); font-size: 0.95rem; text-transform: uppercase; font-family: 'Montserrat', sans-serif; }
    
    .content-wrapper { padding: 80px 15px 120px; max-width: 1200px; margin: 0 auto; }

    /* Banner: Compact & Rounded 0.8rem */
    .edit-banner { background: #262626; border-radius: 0.8rem; padding: 12px 20px; color: white; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
    .banner-sub { color: rgba(255,255,255,0.4); font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; font-family: 'Montserrat', sans-serif; }
    .banner-title { font-size: 0.95rem; font-weight: 800; color: white; font-family: 'Montserrat', sans-serif; text-transform: uppercase; }

    .tab-bar { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid #eee; overflow-x: auto; scrollbar-width: none; }
    .tab-btn { padding: 0.8rem 0; font-weight: 800; font-size: 10px; text-transform: uppercase; color: #999; cursor: pointer; position: relative; background: none; border: none; font-family: 'Montserrat', sans-serif; }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--accent); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .input-card { background: white; border: 1px solid rgba(0,0,0,0.05); padding: 1.5rem; border-radius: 1.2rem; margin-bottom: 1.2rem; box-shadow: 0 5px 20px rgba(0,0,0,0.02); }
    .field-label { font-size: 10px; font-weight: 800; color: #999; text-transform: uppercase; margin-bottom: 0.6rem; display: block; font-family: 'Montserrat', sans-serif; }
    .field-label span { color: #2D5A27; font-size: 11px; margin-left: 10px; font-weight: 700; font-family: 'Sarabun', sans-serif; }
    .field-input { width: 100%; background: #F9F9F8; border: 1.5px solid transparent; border-radius: 0.8rem; padding: 0.9rem 1.1rem; font-size: 14px; outline: none; transition: 0.3s; color: #1A3017; font-weight: 500; }
    .field-input:focus { border-color: var(--accent); background: white; }

    /* Media Styles: Sharp Preview + Delete Button */
    .img-tile { position: relative; aspect-ratio: 16/9; border-radius: 0.8rem; overflow: hidden; border: 1px solid #eee; background: #eee; }
    .img-x { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background: #EF4444; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; border: 2px solid white; font-size: 12px; }
    
    /* Upload Status Label */
    .upload-status { font-size: 9px; font-weight: 800; color: var(--accent); margin-top: 5px; font-family: 'Montserrat', sans-serif; display: none; }

    .ownership-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-top: 10px; }
    .own-item { display: flex; align-items: center; gap: 10px; background: #F9F9F8; padding: 10px 15px; border-radius: 10px; cursor: pointer; border: 1px solid transparent; font-size: 13px; font-weight: 600; }
    
    .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.98); border-top: 1px solid #eee; padding: 15px 20px; z-index: 1000; display: flex; justify-content: center; }
    .btn-update { background: #111; color: white; width: 100%; max-width: 500px; height: 50px; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; font-size: 13px; font-family: 'Montserrat', sans-serif; }

    /* Processing Overlay */
    #loadingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
  </style>
</head>
<body>

  <div id="loadingOverlay">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-white mb-4"></div>
    <div class="text-sm font-800 uppercase tracking-widest" id="loadText">Processing...</div>
  </div>

  <header>
    <div class="brand-center">New Master Asset</div>
    <div onclick="location.href='dashboard.html'" class="px-4 py-2 text-[10px] font-800 text-slate-400 cursor-pointer">BACK</div>
  </header>

  <div class="content-wrapper">
    <div class="edit-banner">
      <div class="banner-sub">Master Vault | Enrollment Suite</div>
      <div class="banner-title">ADD NEW PROPERTY</div>
    </div>
    
    <div class="tab-bar">
      <button id="btn-photo" class="tab-btn active" onclick="switchTab('photo')">Media Assets</button>
      <button id="btn-info" class="tab-btn" onclick="switchTab('info')">Specifications (39 Items)</button>
    </div>

    <div id="tab-photo" class="tab-content active space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="input-card">
          <span class="field-label">Cover Image <span>รูปหน้าปก (Firebase)</span></span>
          <div id="thumbPreview" class="relative w-full aspect-video rounded-xl bg-slate-50 border-2 border-dashed border-slate-200 flex items-center justify-center overflow-hidden mb-3">
            <i class="fas fa-image text-3xl text-slate-200"></i>
          </div>
          <button onclick="document.getElementById('file_thumb').click()" class="w-full py-3 bg-[#2563eb] text-white rounded-lg text-[10px] font-800">UPLOAD COVER</button>
          <div id="status_thumb" class="upload-status">กำลังอัพโหลดรูปภาพ...</div>
          <input type="file" id="file_thumb" class="hidden" accept="image/*" onchange="handleMediaUpload(this, 'thumb')">
          <input type="hidden" id="Thumbnail_Image">
        </div>

        <div class="input-card">
          <span class="field-label">Gallery Album <span>อัลบั้มภาพ</span></span>
          <div id="galleryPreview" class="grid grid-cols-3 gap-2 h-40 overflow-y-auto mb-3 bg-slate-50 p-2 rounded-xl"></div>
          <button onclick="document.getElementById('file_gallery').click()" class="w-full py-3 bg-purple-600 text-white rounded-lg text-[10px] font-800">ADD GALLERY</button>
          <div id="status_album" class="upload-status">กำลังประมวลผลอัลบั้ม...</div>
          <input type="file" id="file_gallery" class="hidden" multiple accept="image/*" onchange="handleMediaUpload(this, 'album')">
          <input type="hidden" id="Album_Image">
        </div>
      </div>

      <div class="input-card">
        <span class="field-label">Documents <span>ไฟล์ PDF (Floor Plan / Brochure)</span></span>
        <div class="space-y-3 mt-3">
          <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
            <i class="fas fa-file-pdf text-red-500"></i>
            <div class="flex-1 text-[11px] font-700 text-slate-600" id="txt-FloorPlan_PDF">No Floor Plan</div>
            <button onclick="document.getElementById('f_floor').click()" class="w-8 h-8 bg-black text-white rounded-lg flex items-center justify-center"><i class="fas fa-upload text-[10px]"></i></button>
            <input type="file" id="f_floor" class="hidden" accept=".pdf" onchange="handleMediaUpload(this, 'pdf', 'FloorPlan_PDF')">
            <input type="hidden" id="FloorPlan_PDF">
          </div>
          <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
            <i class="fas fa-file-pdf text-red-500"></i>
            <div class="flex-1 text-[11px] font-700 text-slate-600" id="txt-Customer_PDF">No Brochure</div>
            <button onclick="document.getElementById('f_cust').click()" class="w-8 h-8 bg-black text-white rounded-lg flex items-center justify-center"><i class="fas fa-upload text-[10px]"></i></button>
            <input type="file" id="f_cust" class="hidden" accept=".pdf" onchange="handleMediaUpload(this, 'pdf', 'Customer_PDF')">
            <input type="hidden" id="Customer_PDF">
          </div>
        </div>
      </div>
    </div>

    <div id="tab-info" class="tab-content space-y-4">
      <div class="input-card grid grid-cols-1 md:grid-cols-3 gap-6">
        <div><label class="field-label">1. HP_ID</label><input id="HP_ID" class="field-input !bg-amber-50 font-800 text-amber-700" readonly placeholder="Fetching ID..."></div>
        <div><label class="field-label">2. Listing Type</label><select id="Listing_Type" class="field-input dyn-opt"></select></div>
        <div><label class="field-label">3. Asset Type</label><select id="Type" class="field-input dyn-opt"></select></div>
        <div><label class="field-label">4. Project Name</label><select id="Project_Name" class="field-input dyn-opt"></select></div>
        <div><label class="field-label">5. Plot No.</label><input id="Plot" class="field-input"></div>
        <div><label class="field-label">6. Status</label><select id="Status" class="field-input dyn-opt"></select></div>
        
        <div class="col-span-full border-t border-b py-6 grid grid-cols-1 md:grid-cols-3 gap-6">
          <div><label class="field-label text-blue-600">7. Sale Price</label><input type="number" id="Sale_Price" class="field-input" oninput="runCalc()"></div>
          <div><label class="field-label">8. Living Area (m2)</label><input type="number" id="Living_Area_sq_m" class="field-input" oninput="runCalc()"></div>
          <div><label class="field-label">9. Price/m2</label><input id="Price_sq_m" class="field-input bg-slate-100" readonly></div>
        </div>

        <div><label class="field-label">13. Land (m2)</label><input type="number" id="Land_Area_sq_m" class="field-input"></div>
        <div><label class="field-label">15. Furnishing</label><select id="Furnishing" class="field-input dyn-opt"></select></div>
        <div><label class="field-label">16. District</label><select id="District" class="field-input dyn-opt"></select></div>
        <div><label class="field-label">17. Sub-District</label><select id="SubDistrict" class="field-input dyn-opt"></select></div>
        <div><label class="field-label">19. Bedrooms</label><select id="Bedrooms" class="field-input dyn-opt"></select></div>
        <div><label class="field-label">20. Bathrooms</label><select id="Bathrooms" class="field-input dyn-opt"></select></div>
        
        <div class="col-span-full">
          <label class="field-label">31. Ownership Type (จาก Settings)</label>
          <div id="ownership-container" class="ownership-grid"></div>
          <input type="hidden" id="Ownership_Type">
        </div>

        <div class="col-span-full"><label class="field-label">37. Description</label><textarea id="Description" rows="4" class="field-input"></textarea></div>
        
        <div class="col-span-full bg-slate-50 p-4 rounded-xl">
          <label class="field-label text-blue-600">38. SYSTEM VISIBILITY</label>
          <select id="System_Status" class="field-input dyn-opt"></select>
        </div>
        
        <div class="col-span-full bg-slate-50 p-4 rounded-xl">
          <label class="field-label text-red-600">39. MAP VISIBILITY</label>
          <select id="Map_Visibility" class="field-input">
            <option value="Show">Show Map</option>
            <option value="Hide">Hide Map</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="save-bar">
    <button id="btn_save" onclick="saveData()" class="btn-update shadow-xl">PUBLISH NEW MASTER</button>
  </div>

  <script>
    // 1. Firebase Config (ใช้ Config เดิมของคุณสมเจตน์)
    const firebaseConfig = { 
        storageBucket: "huahin-properties-e9a3c.appspot.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();

    const GAS_API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    let albumArr = [];

    // 2. Init: Load HP_ID & Settings
    async function init() {
      showLoading("Connecting to Database...");
      try {
        const res = await fetch(GAS_API, { method: 'POST', body: JSON.stringify({ mode: 'getAddContext' }) });
        const result = await res.json();
        
        if(result.ok) {
          // Set HP_ID
          document.getElementById('HP_ID').value = result.nextId;
          
          // Populate Dropdowns
          Object.keys(result.options).forEach(id => {
            const el = document.getElementById(id);
            if(el) {
              el.innerHTML = '<option value="">-- Select --</option>' + 
                result.options[id].map(opt => `<option value="${opt}">${opt}</option>`).join('');
            }
          });

          // Generate Ownership Checkboxes from Settings
          const ownContainer = document.getElementById('ownership-container');
          ownContainer.innerHTML = result.options.Ownership_Type.map(opt => `
            <label class="own-item">
              <input type="checkbox" name="own_check" value="${opt}" class="w-4 h-4 accent-black">
              <span>${opt}</span>
            </label>
          `).join('');
        }
      } catch(e) { console.error(e); }
      hideLoading();
    }

    // 3. Media Upload (Firebase + Compression)
    async function handleMediaUpload(input, target, fieldId) {
      if(!input.files.length) return;
      
      const statusLabel = document.getElementById('status_' + target) || document.getElementById('txt-' + fieldId);
      if(statusLabel) statusLabel.style.display = 'block';

      for (let file of input.files) {
        try {
          // Image Compression for non-PDF
          let fileToUpload = file;
          if(target !== 'pdf' && file.type.startsWith('image/')) {
            fileToUpload = await compressImage(file);
          }

          const path = `properties/${document.getElementById('HP_ID').value}/${Date.now()}_${file.name}`;
          const ref = storage.ref(path);
          await ref.put(fileToUpload);
          const url = await ref.getDownloadURL();

          if(target === 'thumb') {
            document.getElementById('Thumbnail_Image').value = url;
            renderThumb(url);
          } else if(target === 'album') {
            albumArr.push(url);
            renderAlbum();
          } else {
            document.getElementById(fieldId).value = url;
            document.getElementById('txt-' + fieldId).innerHTML = "File Loaded ✅";
          }
        } catch (e) { alert("Upload Failed: " + file.name); }
      }
      if(statusLabel) statusLabel.style.display = 'none';
    }

    function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const maxW = 1280;
            const scale = maxW / img.width;
            canvas.width = maxW;
            canvas.height = img.height * scale;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.85);
          };
        };
      });
    }

    // 4. Render UI
    function renderThumb(url) {
      document.getElementById('thumbPreview').innerHTML = `
        <div class="img-x" onclick="removeThumb()">✕</div>
        <img src="${url}" class="w-full h-full object-cover">
      `;
    }
    function removeThumb() {
      document.getElementById('Thumbnail_Image').value = "";
      document.getElementById('thumbPreview').innerHTML = `<i class="fas fa-image text-3xl text-slate-200"></i>`;
    }

    function renderAlbum() {
      const container = document.getElementById('galleryPreview');
      container.innerHTML = albumArr.map((url, i) => `
        <div class="img-tile">
          <div class="img-x" onclick="removeAlbum(${i})">✕</div>
          <img src="${url}" class="w-full h-full object-cover">
        </div>
      `).join('');
      document.getElementById('Album_Image').value = albumArr.join(',');
    }
    function removeAlbum(i) {
      albumArr.splice(i, 1);
      renderAlbum();
    }

    // 5. Logic
    function runCalc() {
      const price = parseFloat(document.getElementById('Sale_Price').value) || 0;
      const area = parseFloat(document.getElementById('Living_Area_sq_m').value) || 0;
      if(area > 0) document.getElementById('Price_sq_m').value = (price / area).toLocaleString();
    }

    async function saveData() {
      const hpId = document.getElementById('HP_ID').value;
      if(!hpId || hpId.includes("Fetching")) return alert("Please wait for HP_ID");

      showLoading("Publishing Master Asset...");
      
      // Collect Ownership
      const owns = Array.from(document.querySelectorAll('input[name="own_check"]:checked')).map(c => c.value);
      document.getElementById('Ownership_Type').value = owns.join(', ');

      const data = { mode: 'addUnit' };
      document.querySelectorAll('input, select, textarea').forEach(el => {
        if(el.id) data[el.id] = el.value;
      });

      try {
        const res = await fetch(GAS_API, { method: 'POST', body: JSON.stringify(data) });
        const result = await res.json();
        if(result.ok) {
          alert("Success! " + hpId + " has been added.");
          location.href = "dashboard.html";
        }
      } catch(e) { alert("Save Error"); }
      hideLoading();
    }

    function switchTab(t) {
      document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      document.getElementById('btn-' + t).classList.add('active');
    }

    function showLoading(txt) { 
      document.getElementById('loadText').innerText = txt;
      document.getElementById('loadingOverlay').style.display = 'flex'; 
    }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

    window.onload = init;
  </script>
</body>
</html>

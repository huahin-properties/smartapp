<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Security Gateway | Warp Speed Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --navy: #0B1829; --navy-dark: #060F1A; --gold: #C9A84C; }
    body { font-family: 'Montserrat', sans-serif; background: var(--navy-dark); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
    .login-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 3rem 2rem; border-radius: 2.5rem; width: 90%; max-width: 420px; backdrop-filter: blur(20px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .field-input { width: 100%; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 1.2rem; padding: 1.2rem; color: white; margin-bottom: 1.5rem; outline: none; transition: 0.3s; font-size: 15px; }
    .btn-login { background: var(--gold); color: var(--navy-dark); width: 100%; padding: 1.2rem; border-radius: 4rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; }
    
    /* 🎯 สไตล์พิเศษสำหรับปุ่มวาร์ป (ไอคอนสีเหลือง) */
    .warp-btn { cursor: pointer; transition: 0.4s; }
    .warp-btn:hover { transform: scale(1.15); filter: brightness(1.2); }
    .warp-btn:active { transform: scale(0.9); }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <div class="mb-10">
      <div onclick="warpIntoSystem()" class="warp-btn w-20 h-20 bg-gold/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-gold/30 shadow-xl shadow-gold/20">
        <i class="fas fa-user-shield text-[#C9A84C] text-3xl"></i>
      </div>
      <h2 class="text-2xl font-800 text-[#C9A84C] tracking-tighter italic uppercase">Admin Gateway</h2>
      <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] mt-2 italic text-gold">** แตะไอคอนด้านบนเพื่อวาร์ป **</p>
    </div>
    
    <input type="email" id="email" class="field-input" placeholder="Email (Optional)">
    <input type="password" id="password" class="field-input" placeholder="Password (Optional)">
    
    <button onclick="warpIntoSystem()" class="btn-login">ENTER SYSTEM</button>
    
    <div class="mt-8 pt-6 border-t border-white/5">
      <a href="index.html" class="text-slate-500 text-[10px] uppercase font-700 tracking-widest hover:text-gold transition">← Back to Catalog</a>
    </div>
  </div>

  <script>
    function warpIntoSystem() {
      // 🏆 บันทึกสถานะเพื่อปลดล็อกปุ่ม Edit ในหน้า Index/Detail
      localStorage.setItem('admin_session', 'active');
      localStorage.setItem('admin_role', 'Master');
      localStorage.setItem('admin_project', 'All');
      
      // 🚀 วาร์ปเข้า Dashboard ทันที
      location.href = "dashboard.html";
    }
  </script>
</body>
</html>

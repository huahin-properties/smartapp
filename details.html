<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Asset Specifications | MASTER SYSTEM V175</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{--navy:#0B1829;--navy-dark:#060F1A;--gold:#C9A84C;--border:rgba(201,168,76,0.15);--card-bg:#0F172A;--pdf-red: #E02424;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background-color:var(--navy-dark);color:#FDFAF5;font-family:'Montserrat',sans-serif;-webkit-font-smoothing:antialiased}
    #pageSplash{position:fixed;inset:0;background:var(--navy-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;transition:opacity 0.4s}
    header{position:fixed;top:0;width:100%;height:55px;background:rgba(11,24,41,0.95);backdrop-filter:blur(10px);z-index:1000;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 15px}
    .back{text-decoration:none;color:var(--gold);font-size:0.7rem;font-weight:700;text-transform:uppercase;}
    .gallery-container{margin-top:55px;padding:0 15px;max-width:1100px;margin:0 auto}
    .gallery-card{background:#000;border-radius:18px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px;position:relative;}
    .main-stage{width:100%;aspect-ratio:16/10;background:#000;overflow:hidden;position:relative;}
    .main-img{width:100%;height:100%; object-fit:cover; transition:opacity 0.3s}
    .nav-arrow{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,0.3);color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10}
    .content{padding:10px 15px 120px;max-width:900px;margin:0 auto}
    /* 🎯 ระบบ Auto-Hide */
    .info-card{background:var(--card-bg);border-radius:12px;padding:22px;margin-bottom:15px;border:1px solid var(--border); display: none;}
    .info-card.has-data{display:block;}
    .field-wrap{display:none; margin-bottom:12px;}
    .field-wrap.has-val{display:block;}
    .section-title{font-size:0.65rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:18px;display:flex;align-items:center;gap:8px}
    .section-title::after{content:'';flex:1;height:1px;background:var(--border)}
    .label{font-size:0.55rem;color:#7A9BB5;text-transform:uppercase;font-weight:500;margin-bottom:3px}
    .val{font-size:0.85rem;color:#FFF}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
    .footer{position:fixed;bottom:0;width:100%;background:#060F1A;padding:12px 15px;border-top:1px solid var(--border);z-index:1000}
    .btn-chat{background:var(--gold);color:#060F1A;text-decoration:none;padding:15px;border-radius:4px;display:block;text-align:center;font-weight:800}
  </style>
</head>
<body>
<div id="pageSplash"><div style="color:var(--gold);font-weight:800;letter-spacing:4px;">MASTER CATALOG</div></div>
<header><a href="index.html" class="back">✕ Close</a><div style="font-weight:800;color:var(--gold);">DETAIL VIEW</div><div style="width:40px;"></div></header>

<div id="mainUI">
  <div class="gallery-container">
    <div class="gallery-card">
      <div class="main-stage">
        <img id="mainImg" class="main-img" src="" loading="lazy"> <div class="nav-arrow" style="left:10px" onclick="changeSlide(-1)">❮</div>
        <div class="nav-arrow" style="right:10px" onclick="changeSlide(1)">❯</div>
        <div style="position:absolute;right:15px;bottom:15px;background:rgba(0,0,0,0.6);padding:4px 10px;border-radius:50px;font-size:10px;" id="countLabel">0 / 0</div>
      </div>
    </div>
  </div>

  <main class="content">
    <div class="info-card has-data">
      <div style="font-size:0.6rem;color:var(--gold);font-weight:800;margin-bottom:5px;" id="pID"></div>
      <h1 id="pPlot" style="font-size:1.8rem;color:var(--gold);margin-bottom:10px;font-weight:800;"></h1>
      <div id="pPrice" style="font-size:1.4rem;font-weight:700;color:#FFF;margin-bottom:20px;"></div>
      <div class="grid">
        <div id="w-bb" class="field-wrap"><div class="label">Bed / Bath</div><div class="val" id="vBB"></div></div>
        <div id="w-living" class="field-wrap"><div class="label">Living Area</div><div class="val" id="vLiving"></div></div>
        <div id="w-land" class="field-wrap"><div class="label">Land Size</div><div class="val" id="vLand"></div></div>
        <div id="w-pricesq" class="field-wrap"><div class="label">Price per Sq.m</div><div class="val text-[#C9A84C]" id="vPriceSq"></div></div>
      </div>
    </div>

    <div class="info-card" id="card-specs">
      <h2 class="section-title">Specifications</h2>
      <div class="grid" id="specs-grid"></div>
    </div>

    <div class="info-card" id="mapSection">
      <h2 class="section-title">Location Map</h2>
      <div style="width:100%;aspect-ratio:1/1;border-radius:12px;overflow:hidden;"><div id="leafletMap" style="width:100%;height:100%;"></div></div>
    </div>

    <div class="info-card" id="amenitiesSection">
      <h2 class="section-title">Nearby Lifestyle & Amenities</h2>
      <div id="nearbyGrid"></div>
    </div>
  </main>
</div>

<div class="footer"><a href="https://line.me/R/ti/p/@qap7218t" class="btn-chat">💬 Live Chat Concierge</a></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec';
const hpId=new URLSearchParams(window.location.search).get('id');
const LANDMARKS=[ {name:'Hua Hin Beach',lat:12.5696,lon:99.9602}, {name:'Cicada Market',lat:12.5342,lon:99.9655}, {name:'Bluport Mall',lat:12.5518,lon:99.9631} ];
let images=[], idx=0, leafletMap=null;

// 🎯 ฟังก์ชันวิเศษ: แสดงหัวข้อเฉพาะที่มีค่า
function buildField(label, val) {
  if(!val || val === "-" || val === "0" || val === "") return "";
  document.getElementById('card-specs').classList.add('has-data');
  return `<div class="field-wrap has-val"><div class="label">${label}</div><div class="val">${val}</div></div>`;
}

// ⚡ ฟังก์ชันระบบ Instant View (LocalStorage)
async function init(){
  if(!hpId) return;

  // 1. ดึงจากลิ้นชักความจำทันที (0.1s)
  const cacheKey = `cache_detail_${hpId}`;
  const cachedData = localStorage.getItem(cacheKey);
  if(cachedData){
    renderUI(JSON.parse(cachedData));
    document.getElementById('pageSplash').style.opacity='0';
    setTimeout(()=>document.getElementById('pageSplash').style.display='none',400);
  }

  // 2. แอบดึงข้อมูลใหม่เบื้องหลัง (Background Sync)
  try{
    const res = await fetch(`${SCRIPT_URL}?mode=getUnitDetail&id=${encodeURIComponent(hpId)}`);
    const json = await res.json();
    if(json.ok) {
      localStorage.setItem(cacheKey, JSON.stringify(json.data));
      renderUI(json.data); // อัปเดตทับข้อมูลเก่า
    }
  }catch(e){}
  
  if(!cachedData){ // ถ้าไม่เคยโหลดมาก่อนเลย ค่อยปิด Splash ตอนนี้
    document.getElementById('pageSplash').style.opacity='0';
    setTimeout(()=>document.getElementById('pageSplash').style.display='none',400);
  }
}

function renderUI(u){
  // Gallery Logic
  images = u.Album_Image ? u.Album_Image.split(',').filter(Boolean) : [u.Thumbnail_Image];
  document.getElementById('mainImg').src = images[idx];
  document.getElementById('countLabel').textContent = `${idx+1} / ${images.length}`;

  // Identity & Auto-Hide logic
  document.getElementById('pID').textContent = u.HP_ID;
  document.getElementById('pPlot').textContent = `Plot ${u.Plot || '-'}`;
  document.getElementById('pPrice').textContent = u.Sale_Price ? `฿${Number(u.Sale_Price).toLocaleString()}` : '';

  const sync = (vId, wId, val) => {
    if(val && val !== "-" && val !== "0") {
      document.getElementById(vId).textContent = val;
      document.getElementById(wId).classList.add('has-val');
    }
  };

  sync('vBB', 'w-bb', `${u.Bedrooms||''} Bed | ${u.Bathrooms||''} Bath`);
  sync('vLiving', 'w-living', u.Living_Area_sq_m ? `${u.Living_Area_sq_m} m²` : "");
  sync('vLand', 'w-land', u.Land_Area_sq_m ? `${u.Land_Area_sq_m} m²` : "");
  if(u.Sale_Price && u.Living_Area_sq_m) {
    sync('vPriceSq', 'w-pricesq', `฿${Math.round(u.Sale_Price/u.Living_Area_sq_m).toLocaleString()} / m²`);
  }

  // Specifications Grid (Auto-Hide)
  document.getElementById('specs-grid').innerHTML = 
    buildField("Furnishing", u.Furnishing) + buildField("Listing Status", u.Status) +
    buildField("Pool System", u.Pool_System) + buildField("Kitchen Style", u.Kitchen_Type) +
    buildField("Common Fee", u.Common_Fee_Rate ? `฿${u.Common_Fee_Rate} / m²` : "");

  // 📍 Map & Amenities (Persistent Control)
  if(u.Coordinates){
    const [lat, lon] = u.Coordinates.split(',').map(Number);
    if(u.Map_Visibility !== 'Hide'){
      document.getElementById('mapSection').classList.add('has-data');
      if(!leafletMap) {
        leafletMap = L.map('leafletMap',{zoomControl:false}).setView([lat, lon], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(leafletMap);
        L.marker([lat, lon]).addTo(leafletMap);
      }
    }
    document.getElementById('amenitiesSection').classList.add('has-data');
    document.getElementById('nearbyGrid').innerHTML = LANDMARKS.map(loc => {
      const d = getDistance(lat, lon, loc.lat, loc.lon);
      return `<div class="flex justify-between py-3 border-b border-white/5 text-xs"><span class="text-white/40">${loc.name}</span><span class="text-[#C9A84C] font-700">${d.toFixed(1)} km</span></div>`;
    }).join('');
  }
}

function getDistance(lat1,lon1,lat2,lon2){ const R=6371; const dLat=(lat2-lat1)*Math.PI/180; const dLon=(lon2-lon1)*Math.PI/180; const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*1.35; }
function changeSlide(n){ idx=(idx+n+images.length)%images.length; document.getElementById('mainImg').src=images[idx]; document.getElementById('countLabel').textContent=`${idx+1} / ${images.length}`; }
init();
</script>
</body>
</html>

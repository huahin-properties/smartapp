<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Master Specifications | HUA HIN PROPERTIES</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --navy: #0B1829; --navy-dark: #060F1A; --gold: #C9A84C; --white: #FDFAF5; --border: rgba(255, 255, 255, 0.08); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--navy-dark); color: var(--white); font-family: 'Montserrat', sans-serif; }
    header { position: fixed; top: 0; width: 100%; height: 55px; background: rgba(6, 15, 26, 0.95); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
    .back-btn { text-decoration: none; color: var(--gold); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    
    /* Gallery Section */
    .gallery-container { margin-top: 65px; padding: 10px; max-width: 1000px; margin-left: auto; margin-right: auto; }
    .main-stage { position: relative; width: 100%; aspect-ratio: 16/11; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
    .main-img { width: 100%; height: 100%; object-fit: cover; }
    .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.4); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; border: 1px solid rgba(255,255,255,0.1); }
    
    .content { padding: 15px; max-width: 800px; margin: 0 auto 100px; }
    .info-card { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); }
    .prop-title { font-size: 1.4rem; font-weight: 800; color: var(--gold); margin-bottom: 5px; }
    .price-tag { font-size: 1.2rem; font-weight: 700; color: #E4C46A; margin-bottom: 15px; }
    
    /* 🎯 Floating Admin Edit Button */
    .admin-edit-float { 
      position: fixed; bottom: 30px; right: 25px; width: 55px; height: 55px; 
      background: var(--gold); color: var(--navy-dark); border-radius: 50%; 
      display: none; align-items: center; justify-content: center; 
      font-size: 22px; z-index: 9999; text-decoration: none; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid var(--navy-dark);
      transition: 0.3s;
    }
    .admin-edit-float:active { transform: scale(0.9); }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="back-btn"><i class="fas fa-chevron-left mr-1"></i> Back</a>
    <div style="font-weight:800; color:var(--gold); font-size:0.8rem;">UNIT DETAILS</div>
    <div style="width:50px"></div>
  </header>

  <div class="gallery-container">
    <div class="main-stage">
      <img id="mainImg" class="main-img" src="">
      <div class="nav-arrow" style="left:10px" onclick="changeSlide(-1)">❮</div>
      <div class="nav-arrow" style="right:10px" onclick="changeSlide(1)">❯</div>
    </div>
  </div>

  <main class="content">
    <div class="info-card">
      <h1 id="pPlot" class="prop-title">Loading...</h1>
      <div id="pPrice" class="price-tag">฿0</div>
      <div id="pDesc" style="font-size:0.85rem; color:#A0AEC0; line-height:1.6;"></div>
    </div>
    </main>

  <a id="adminQuickEdit" href="#" class="admin-edit-float">
    <i class="fas fa-pencil-alt"></i>
  </a>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    const hpId = new URLSearchParams(window.location.search).get('id');
    let images = [], idx = 0;

    async function init() {
      if(!hpId) return;

      // 🏆 1. ตรวจสอบสิทธิ์ Master ทันที (Persistent Login Check)
      // ถ้าเครื่องนี้เคย Login Master ไว้ และยังไม่ได้ Logout ปุ่มแก้ไขจะขึ้นมาทันที
      const sess = localStorage.getItem('master_session');
      const role = localStorage.getItem('master_role');
      
      if(sess === 'active' && role === 'Super Admin') {
        const editBtn = document.getElementById('adminQuickEdit');
        editBtn.href = `edit.html?id=${hpId}`; // ส่งไปหน้าแก้ไขตรงๆ
        editBtn.style.display = 'flex'; // แสดงปุ่มให้แอดมินเห็น
      }

      // 2. โหลดข้อมูลยูนิตปกติ
      try {
        const res = await fetch(`${API}?mode=getUnitDetail&id=${hpId}`);
        const json = await res.json();
        if(json.ok) renderData(json.data);
      } catch(e) { console.error(e); }
    }

    function renderData(u) {
      document.getElementById('pPlot').textContent = `Plot ${u.Plot || '-'}`;
      document.getElementById('pPrice').textContent = `฿${Number(u.Sale_Price || 0).toLocaleString()}`;
      document.getElementById('pDesc').textContent = u.Description || "";
      images = u.Album_Image ? u.Album_Image.split(',') : [u.Thumbnail_Image];
      setMain(0);
    }

    function setMain(i) {
      idx = (i + images.length) % images.length;
      document.getElementById('mainImg').src = images[idx];
    }
    function changeSlide(n) { setMain(idx + n); }

    window.onload = init;
  </script>
</body>
</html>

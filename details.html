<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Asset Details | V188 Master</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{--navy-dark:#060F1A;--gold:#C9A84C;--border:rgba(201,168,76,0.15);--card-bg:#0F172A;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background-color:var(--navy-dark);color:#FDFAF5;font-family:'Montserrat',sans-serif;}
    #pageSplash{position:fixed;inset:0;background:var(--navy-dark);display:flex;align-items:center;justify-content:center;z-index:10000;transition:opacity 0.4s}
    header{position:fixed;top:0;width:100%;height:55px;background:rgba(11,24,41,0.95);backdrop-filter:blur(10px);z-index:1000;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 15px}
    .back{text-decoration:none;color:var(--gold);font-weight:700;text-transform:uppercase;font-size:0.7rem;}
    .gallery-container{margin-top:65px;padding:15px;max-width:1100px;margin-left:auto;margin-right:auto;}
    .main-stage{position:relative;width:100%;aspect-ratio:16/12;background:#000;border-radius:18px;overflow:hidden;border:1px solid var(--border)}
    .main-img{width:100%;height:100%;object-fit:cover;}
    .content{padding:15px 15px 100px;max-width:900px;margin:0 auto}
    .info-card{background:var(--card-bg);border-radius:12px;padding:22px;margin-bottom:15px;border:1px solid var(--border);display:none;}
    .info-card.has-data{display:block;}
    .field-wrap{display:none;margin-bottom:12px;}
    .field-wrap.has-val{display:block;}
    .section-title{font-size:0.65rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:15px;display:flex;align-items:center;gap:8px}
    .section-title::after{content:'';flex:1;height:1px;background:var(--border)}
    .label{font-size:0.55rem;color:#7A9BB5;text-transform:uppercase;margin-bottom:3px}
    .val{font-size:0.85rem;color:#FFF}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
    .map-box{width:100%;aspect-ratio:1/1;border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-top:10px}
    #leafletMap{width:100%;height:100%;background:#0F172A}
    .nearby-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border);font-size:0.75rem;}
    .footer{position:fixed;bottom:0;width:100%;background:#060F1A;padding:12px 15px;border-top:1px solid var(--border);z-index:1000}
    .btn-chat{background:var(--gold);color:#060F1A;text-decoration:none;padding:15px;border-radius:4px;display:block;text-align:center;font-weight:800;text-transform:uppercase;font-size:0.88rem;}
  </style>
</head>
<body>
<div id="pageSplash"><div style="color:var(--gold);font-weight:800;letter-spacing:4px;">LOADING...</div></div>
<header><a href="index.html" class="back">✕ Close</a><div style="font-weight:800;color:var(--gold);">DETAIL</div><div style="width:40px;"></div></header>

<div class="gallery-container">
  <div class="main-stage"><img id="mainImg" class="main-img" src=""></div>
</div>

<main class="content">
  <div class="info-card has-data">
    <div id="pID" style="font-size:0.6rem;color:var(--gold);font-weight:800;"></div>
    <h1 id="pPlot" style="font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold);margin-top:5px;"></h1>
    <div id="pLocText" style="font-size:0.75rem;color:#7A9BB5;margin-bottom:15px;"></div>
    <div id="pPrice" style="font-size:1.4rem;font-weight:700;margin-bottom:20px;"></div>
    
    <div class="grid">
      <div id="w-bed" class="field-wrap"><div class="label">Bedrooms</div><div class="val" id="vBed"></div></div>
      <div id="w-bath" class="field-wrap"><div class="label">Bathrooms</div><div class="val" id="vBath"></div></div>
      <div id="w-living" class="field-wrap"><div class="label">Living Area</div><div class="val" id="vLiving"></div></div>
      <div id="w-land" class="field-wrap"><div class="label">Land Size</div><div class="val" id="vLand"></div></div>
    </div>
  </div>

  <div class="info-card" id="mapSection">
    <h2 class="section-title">Location</h2>
    <div class="map-box"><div id="leafletMap"></div></div>
    <div id="nearbyList" style="margin-top:15px;"></div>
  </div>
</main>

<div class="footer"><a href="#" class="btn-chat">💬 Contact Agent</a></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec';
const hpId=new URLSearchParams(window.location.search).get('id');
let leafletMap=null;

function syncField(valId, wrapId, value) {
  const el = document.getElementById(valId);
  const wrap = document.getElementById(wrapId);
  if (value && value !== "-" && value !== "") {
    el.textContent = value;
    wrap.classList.add('has-val');
    wrap.closest('.info-card').classList.add('has-data');
  }
}

async function init(){
  if(!hpId) return;
  try{
    const res = await fetch(`${SCRIPT_URL}?mode=getUnitDetail&id=${encodeURIComponent(hpId)}`);
    const json = await res.json();
    if(json.ok) renderData(json.data);
  } catch(e) {}
  document.getElementById('pageSplash').style.opacity='0';
  setTimeout(()=>document.getElementById('pageSplash').style.display='none',400);
}

function renderData(u){
  document.getElementById('pID').textContent = u.HP_ID;
  document.getElementById('pPlot').textContent = `Plot ${u.Plot||'-'}`;
  document.getElementById('pLocText').textContent = `📍 ${u.SubDistrict||''}, ${u.District||''}`;
  document.getElementById('pPrice').textContent = u.Sale_Price ? `฿${Number(u.Sale_Price).toLocaleString()}` : 'Price on Request';
  
  syncField('vBed', 'w-bed', u.Bedrooms);
  syncField('vBath', 'w-bath', u.Bathrooms);
  syncField('vLiving', 'w-living', u.Living_Area_sq_m ? u.Living_Area_sq_m + ' m²' : '');
  syncField('vLand', 'w-land', u.Land_Area_sq_m ? u.Land_Area_sq_m + ' m²' : '');
  document.getElementById('mainImg').src = u.Thumbnail_Image;

  // 🎯 Logic ซ่อนแผนที่
  const isAdmin = localStorage.getItem('admin_session') === 'active';
  const isHidden = u.Map_Visibility === 'Hide';
  const coords = String(u.Coordinates||'').split(',');

  if(coords.length === 2 && (!isHidden || isAdmin)){
    document.getElementById('mapSection').style.display = 'block';
    if(!leafletMap){
      const lat = Number(coords[0]), lon = Number(coords[1]);
      leafletMap = L.map('leafletMap',{zoomControl:false, attributionControl:false}).setView([lat, lon], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(leafletMap);
      L.marker([lat, lon]).addTo(leafletMap);
    }
  }
}
init();
</script>
</body>
</html>

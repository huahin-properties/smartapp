<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Master Catalog | HUA HIN PROPERTIES V175</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --navy: #0B1829; --navy-dark: #060F1A; --gold: #C9A84C; --white: #FDFAF5; --border: rgba(255, 255, 255, 0.08); --row-h: 80px; --thumb-w: 105px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--navy-dark); color: var(--white); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
    
    /* 🎯 Custom Loader Styling (Black Background) */
    #pageSplash { position: fixed; inset: 0; background: #000000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.6s ease-out; }
    .loader-icons { font-size: 2.2rem; margin-bottom: 15px; display: flex; gap: 10px; }
    .loader-icons span { display: inline-block; animation: bounce 0.6s infinite alternate; }
    .loader-icons span:nth-child(2) { animation-delay: 0.2s; }
    .loader-icons span:nth-child(3) { animation-delay: 0.4s; }
    .loader-text { color: #FFFFFF; font-weight: 800; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; font-family: 'Montserrat'; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }

    header { position: fixed; top: 0; width: 100%; height: 55px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: rgba(6, 15, 26, 0.95); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid var(--border); }
    .brand-center { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 800; color: var(--gold); text-decoration: none; font-size: 0.9rem; white-space: nowrap; }
    .menu-trigger { display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; }
    .menu-trigger i { font-size: 1.1rem; color: var(--gold); }
    .menu-trigger span { font-size: 9px; font-weight: 700; color: var(--gold); text-transform: uppercase; margin-top: 1px; letter-spacing: 0.5px; }
    .brand-logo-img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1.2px solid var(--gold); }
    .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--navy); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.5); padding: 60px 20px; border-right: 1px solid var(--border); }
    .sidebar.active { left: 0; }
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1999; display: none; }
    .sidebar-overlay.active { display: block; }
    .menu-item { display: flex; align-items: center; gap: 15px; padding: 15px; color: var(--white); text-decoration: none; border-bottom: 1px solid var(--border); font-size: 0.85rem; font-weight: 600; transition: 0.3s; }
    .menu-item i { color: var(--gold); width: 20px; text-align: center; }
    .hero { padding: 75px 15px 10px; text-align: center; }
    .search-box-wrapper { position: relative; width: 100%; max-width: 550px; margin: 0 auto 10px; }
    .search-input { width: 100%; background: #FFFFFF; border: 1px solid var(--gold); border-radius: 50px; padding: 10px 45px 10px 40px; color: #0B1829; font-weight: 600; font-size: 0.85rem; outline: none; }
    .reset-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--gold); cursor: pointer; font-size: 1rem; transition: 0.3s; z-index: 10; padding: 5px; }
    .search-icon-fixed { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #999; font-size: 0.9rem; }
    .filters-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
    .filter-select { background: #FFFFFF; border: 1px solid var(--gold); border-radius: 8px; padding: 8px; color: #0B1829; font-size: 0.75rem; font-weight: 600; text-align: center; outline: none; appearance: none; }
    .pill-container { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
    .pill { white-space: nowrap; padding: 6px 14px; border-radius: 50px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: #7A9BB5; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; cursor: pointer; }
    .pill.active { background: var(--gold); color: var(--navy-dark); border-color: var(--gold); }
    .prop-list { padding: 0 12px 40px; display: grid; grid-template-columns: 1fr; gap: 8px; }
    .card { background: rgba(11, 24, 41, 0.9); border: 1px solid var(--border); border-radius: 12px; display: flex; height: var(--row-h); overflow: hidden; text-decoration: none; color: inherit; transition: 0.2s; }
    .card:hover { border-color: var(--gold); background: rgba(255, 255, 255, 0.05); }
    .card-img { width: var(--thumb-w); flex-shrink: 0; position: relative; background: #000; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .hp-id { position: absolute; top: 4px; left: 6px; font-size: 0.5rem; color: var(--navy-dark); background: var(--gold); padding: 2px 6px; border-radius: 4px; font-weight: 800; }
    .card-info { flex: 1; padding: 4px 10px; display: flex; flex-direction: column; justify-content: center; gap: 2px; min-width: 0; }
    .info-row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 5px; }
    .prop-name { font-size: 0.82rem; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .price-new { font-size: 0.95rem; font-weight: 800; color: #E4C46A; white-space: nowrap; }
    .status-tag { font-size: 0.48rem; padding: 1.5px 5px; border-radius: 3px; border: 1px solid var(--gold); color: var(--gold); font-weight: 800; text-transform: uppercase; }
    .furnish-tag { color: var(--gold); font-size: 0.48rem; font-weight: 800; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
    @media (min-width: 768px) { :root { --row-h: 90px; --thumb-w: 140px; } .prop-list { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>

  <div id="pageSplash">
    <div class="loader-icons">
      <span>🐚</span>
      <span>🌊</span>
      <span>🌴</span>
    </div>
    <div class="loader-text">HUAHIN.PROPERTIES</div>
  </div>

  <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
  <div class="sidebar" id="sidebar">
    <div style="color:var(--gold); font-weight:800; margin-bottom:30px; font-size:1.1rem; border-bottom:2px solid var(--gold); padding-bottom:10px;">NAVIGATION</div>
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i> HOME</a>
    <div id="authMenuSection"><a href="gateway.html" class="menu-item"><i class="fas fa-user-shield"></i> ADMIN LOGIN</a></div>
    <a href="https://line.me/R/ti/p/@qap7218t" class="menu-item"><i class="fab fa-line"></i> CONTACT US</a>
    <a href="#" onclick="toggleMenu()" class="menu-item" style="color:#7A9BB5; border-bottom:none;"><i class="fas fa-times"></i> CLOSE MENU</a>
  </div>

  <header>
    <div class="menu-trigger" onclick="toggleMenu()"><i class="fas fa-bars"></i><span>MENU</span></div>
    <a href="index.html" class="brand-center">HuaHin.Properties</a>
    <img src="brand-logo.png" class="brand-logo-img" alt="Logo">
  </header>

  <section class="hero">
    <div style="max-width:550px; margin:0 auto;">
      <div class="search-box-wrapper">
        <i class="fas fa-search search-icon-fixed"></i>
        <input type="text" id="sI" class="search-input" placeholder="Search Plot or ID..." onkeyup="f()">
        <div class="reset-btn" onclick="resetFilters()" title="Reset All Filters"><i class="fas fa-sync-alt"></i></div>
      </div>
      <div class="filters-grid">
        <select id="dF" onchange="f()" class="filter-select"><option value="">All Districts</option></select>
        <select id="sF" onchange="f()" class="filter-select"><option value="">Price Sort</option><option value="low">Low → High</option><option value="high">High → Low</option></select>
        <select id="bF" onchange="f()" class="filter-select"><option value="">Bedrooms</option></select>
      </div>
      <div class="pill-container" id="pillBox">
        <div class="pill active" data-f="all">All</div>
        <div class="pill" data-f="Sale">Sale</div><div class="pill" data-f="Rent">Rent</div>
        <div class="pill" data-f="Pool Villa">Pool Villa</div><div class="pill" data-f="Condo">Condo</div>
        <div class="pill" data-f="House">House</div><div class="pill" data-f="Land">Land</div>
      </div>
    </div>
  </section>
  <div style="display:flex; justify-content:space-between; padding:15px; border-top:1px solid var(--border); margin-top:10px;">
    <h2 style="font-size:0.9rem; color:var(--gold); text-transform:uppercase; font-weight:800;">Inventory Stream</h2>
    <span id="unitCount" style="font-size:0.65rem; color:#7A9BB5; font-weight:700;">Ready</span>
  </div>
  <main class="prop-list" id="propGrid"></main>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    let data = [];
    const startTime = Date.now(); // ⏱️ เริ่มจับเวลาตอนโหลดหน้า

    function hideSplash() { 
      const elapsed = Date.now() - startTime;
      const waitTime = Math.max(2000 - elapsed, 0); // 🎯 ตั้งเวลาขั้นต่ำ 2 วินาที (2000ms)
      
      setTimeout(() => {
        const splash = document.getElementById('pageSplash');
        if(splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.style.display = 'none', 600);
        }
      }, waitTime);
    }

    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('active');
      document.getElementById('overlay').classList.toggle('active');
    }

    function checkAuthUI() {
      const authSection = document.getElementById('authMenuSection');
      const isLoggedIn = localStorage.getItem('admin_session') === 'active';
      if (isLoggedIn) {
        authSection.innerHTML = `<a href="dashboard.html" class="menu-item"><i class="fas fa-columns"></i> ADMIN DASHBOARD</a><a href="#" onclick="handleLogout(event)" class="menu-item" style="color:#EF4444;"><i class="fas fa-sign-out-alt"></i> SIGN OUT</a>`;
      } else {
        authSection.innerHTML = `<a href="gateway.html" class="menu-item"><i class="fas fa-user-shield"></i> ADMIN LOGIN</a>`;
      }
    }

    function handleLogout(e) {
      e.preventDefault();
      if(confirm("คุณต้องการออกจากระบบใช่หรือไม่?")) {
        localStorage.clear();
        location.reload();
      }
    }

    function render(res) {
      document.getElementById('unitCount').textContent = `${res.length} UNITS`;
      document.getElementById('propGrid').innerHTML = res.map(u => {
        const label = u.Listing_Type === 'Rent' ? 'For Rent' : 'For Sale';
        let priceVal = u.Listing_Type === 'Rent' ? (Number(u.Monthly_Rent) || Number(u.Sale_Price) || 0) : (Number(u.Sale_Price) || 0);
        return `<a href="details.html?id=${u.HP_ID}" class="card"><div class="card-img"><span class="hp-id">${u.HP_ID}</span><img src="${u.Thumbnail_Image || 'https://via.placeholder.com/400x250'}" loading="lazy"></div><div class="card-info"><div class="info-row"><div class="prop-name">${label} | ${u.District || ''}</div><div class="furnish-tag">${u.Furnishing || '-'}</div></div><div class="info-row"><div style="font-size:0.65rem; color:#7A9BB5;">${u.Bedrooms} Bed | ${u.Living_Area_sq_m || 0} m²</div><div class="price-new">฿${priceVal.toLocaleString()}</div></div><div class="info-row"><span class="status-tag">${u.Status}</span><div style="font-size:0.58rem; color:#7A9BB5;">${u.Zone || ''}</div></div></div></a>`;
      }).join('');
    }

    function resetFilters() { document.getElementById('sI').value = ''; f(); }

    async function init() {
      checkAuthUI();
      const cached = localStorage.getItem('hp_master_data');
      if (cached) { 
        data = JSON.parse(cached); updateFilters(); f(); 
        hideSplash(); // โหลดจากแคชก็ยังต้องโชว์แบรนด์ตามเวลาที่ตั้งไว้
      } 
      try {
        const res = await fetch(`${API}?mode=getListSmall&project=all`);
        const newData = await res.json();
        data = newData;
        localStorage.setItem('hp_master_data', JSON.stringify(data));
        updateFilters(); f();
        hideSplash(); 
      } catch (err) { console.error(err); hideSplash(); }
    }

    function updateFilters() {
      const districts = [...new Set(data.map(p => p.District))].filter(Boolean).sort();
      document.getElementById('dF').innerHTML = `<option value="">All Districts</option>` + districts.map(d => `<option value="${d}">${d}</option>`).join('');
      const beds = [...new Set(data.map(p => p.Bedrooms))].sort((a,b)=>a-b);
      document.getElementById('bF').innerHTML = `<option value="">Bedrooms</option>` + beds.map(b => `<option value="${b}">${b} Bed</option>`).join('');
    }

    function f() {
      const q = document.getElementById('sI').value.toLowerCase();
      const d = document.getElementById('dF').value;
      const b = document.getElementById('bF').value;
      const pill = document.querySelector('.pill.active').dataset.f;
      const sort = document.getElementById('sF').value;
      let res = data.filter(u => u.System_Status === 'Online' && (!q || `${u.HP_ID} ${u.Plot} ${u.District} ${u.Zone}`.toLowerCase().includes(q)) && (!d || u.District === d) && (!b || String(u.Bedrooms) === b) && (pill === 'all' || u.Listing_Type === pill || u.Type === pill));
      if (sort === "low") res.sort((x,y) => (Number(x.Sale_Price)||0) - (Number(y.Sale_Price)||0));
      else if (sort === "high") res.sort((x,y) => (Number(y.Sale_Price)||0) - (Number(x.Sale_Price)||0));
      render(res);
    }

    document.getElementById('pillBox').addEventListener('click', (e) => { if (e.target.classList.contains('pill')) { document.querySelectorAll('.pill').forEach(p => p.classList.remove('active')); e.target.classList.add('active'); f(); } });
    window.onload = init;
  </script>
</body>
</html>

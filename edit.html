<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Master Editor V12.0 | HUA HIN PROPERTIES</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

  <style>
    :root { --brand: #262626; --accent: #C9A84C; --bg: #F8FAF8; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: #1A3017; margin: 0; padding: 0; overflow-x: hidden; }
    header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
    .brand-center { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 800; color: var(--accent); font-size: 0.95rem; text-transform: uppercase; font-family: 'Montserrat'; }
    
    .content-wrapper { padding: 80px 10px 200px; max-width: 1100px; margin: 0 auto; }
    .edit-banner { background: #262626; border-radius: 0.8rem; padding: 15px 20px; color: white; margin-bottom: 20px; }
    .banner-title { font-size: 1rem; font-weight: 800; color: white; font-family: 'Montserrat'; text-transform: uppercase; }

    .tab-bar { display: flex; gap: 1rem; margin-bottom: 1rem; border-bottom: 1px solid #eee; overflow-x: auto; }
    .tab-btn { padding: 0.8rem 0; font-weight: 800; font-size: 10px; text-transform: uppercase; color: #999; cursor: pointer; position: relative; background: none; border: none; font-family: 'Montserrat'; }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .input-card { background: white; border: 1px solid rgba(0,0,0,0.05); padding: 1rem; border-radius: 1.2rem; margin-bottom: 1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
    .field-label { font-size: 10px; font-weight: 800; color: #999; text-transform: uppercase; margin-bottom: 0.5rem; display: block; font-family: 'Montserrat'; }
    .field-label span { color: #2D5A27; font-size: 10px; margin-left: 5px; font-weight: 700; border-left: 2px solid #eee; padding-left: 8px; font-family: 'Sarabun'; }
    .field-input { width: 100%; background: #F9F9F8; border: 1.5px solid transparent; border-radius: 0.8rem; padding: 0.8rem 1rem; font-size: 14px; outline: none; transition: 0.3s; color: #1A3017; font-weight: 500; }
    .field-input:focus { border-color: var(--accent); background: white; }

    /* 📸 Bulk Select UI */
    .gallery-container { background: #fdfdfd; border: 1px dashed #eee; border-radius: 1rem; padding: 0.5rem; display: grid; gap: 0.5rem; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    @media (min-width: 1024px) { .gallery-container { grid-template-columns: repeat(6, minmax(0, 1fr)); } }

    .img-tile { position: relative; aspect-ratio: 1; border-radius: 0.6rem; overflow: hidden; border: 2px solid #f0f0f0; cursor: pointer; }
    .img-tile.tile-selected { border-color: #EF4444; }
    .img-selected-overlay { position: absolute; inset: 0; background: rgba(239, 68, 68, 0.15); display: none; }
    .tile-selected .img-selected-overlay { display: block; }
    
    .img-x { position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; border-radius: 50%; background: #EF4444; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; z-index: 10; border: 1.5px solid white; }
    .img-check { position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; border-radius: 50%; background: white; color: #EF4444; display: flex; align-items: center; justify-content: center; font-size: 10px; z-index: 10; border: 1.5px solid #EF4444; }
    .tile-selected .img-check { background: #EF4444; color: white; }

    #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    #loadingOverlay.hidden { opacity: 0; pointer-events: none; }

    .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #eee; padding: 15px; z-index: 1000; text-align: center; }
    .btn-update { background: #111; color: white; width: 100%; max-width: 600px; height: 50px; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; font-family: 'Montserrat'; }
    .btn-delete-multi { background: #EF4444; color: white; padding: 10px 15px; border-radius: 0.8rem; font-weight: 800; font-size: 10px; text-transform: uppercase; margin-bottom: 10px; display: none; cursor: pointer; }
    
    .project-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 1.5rem; max-height: 70vh; overflow-y: auto; padding: 20px; }
    .project-opt { padding: 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-weight: 700; color: #1A3017; }
  </style>
</head>
<body>

  <div id="loadingOverlay">
    <i class="fas fa-circle-notch animate-spin text-3xl text-amber-500 mb-3"></i>
    <div class="text-[9px] font-800 uppercase tracking-widest text-slate-400">Final System Check V12.0...</div>
  </div>

  <div class="project-modal" id="pModal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div style="font-weight:800; font-size:12px; color:var(--accent); margin-bottom:15px; display:flex; justify-content:space-between; font-family: 'Montserrat';">
        <span>SELECT PROJECT</span><i class="fas fa-times" onclick="document.getElementById('pModal').style.display='none'"></i>
      </div>
      <div id="modal-list"></div>
    </div>
  </div>

  <header>
    <div onclick="history.back()" style="cursor:pointer; color:var(--accent);"><i class="fas fa-chevron-left text-lg"></i></div>
    <div class="brand-center">Master Editor</div>
    <div style="width:20px;"></div>
  </header>

  <div class="content-wrapper">
    <div class="edit-banner">
      <div style="font-size:8px; font-weight:800; color:rgba(255,255,255,0.4); text-transform:uppercase; font-family:'Montserrat';">Verified Multi-Delete V12.0</div>
      <div class="banner-title">EDIT MASTER: <span id="displayId">...</span></div>
    </div>
    
    <div class="tab-bar">
      <button id="btn-photo" class="tab-btn active" onclick="switchTab('photo')">Visual Assets</button>
      <button id="btn-info" class="tab-btn" onclick="switchTab('info')">Specifications (39 Items)</button>
    </div>

    <div id="tab-photo" class="tab-content active space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="input-card">
          <span class="field-label">Main Image Cover <span>รูปภาพหน้าปกหลัก</span></span>
          <div id="thumbPreview" class="relative w-full aspect-video rounded-xl bg-slate-50 border-2 border-dashed border-slate-100 flex items-center justify-center overflow-hidden mb-3">
             <i class="fas fa-image text-3xl text-slate-200"></i>
          </div>
          <button onclick="document.getElementById('f_thumb').click()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-800 text-[10px] uppercase">UPDATE COVER</button>
          <input type="file" id="f_thumb" class="hidden" accept="image/*" onchange="handleMediaUpload(this, 'thumb')"><input type="hidden" id="Thumbnail_Image">
        </div>
        
        <div class="input-card">
          <div class="flex justify-between items-center mb-2">
            <span class="field-label">Visual Gallery <span>อัลบั้มรูปภาพ</span></span>
            <button id="btnDeleteSelected" onclick="deleteSelectedImages()" class="btn-delete-multi">ลบรูปภาพที่เลือก (<span id="selectedCount">0</span>)</button>
          </div>
          <div id="galleryPreview" class="gallery-container mb-3"></div>
          <button onclick="document.getElementById('f_gallery').click()" class="w-full py-3 bg-purple-600 text-white rounded-xl font-800 text-[10px] uppercase">ADD IMAGES</button>
          <input type="file" id="f_gallery" class="hidden" multiple accept="image/*" onchange="handleMediaUpload(this, 'album')"><input type="hidden" id="Album_Image">
        </div>
      </div>
    </div>

    <div id="tab-info" class="tab-content space-y-4">
      <div class="input-card grid grid-cols-1 md:grid-cols-3 gap-6">
        <div><label class="field-label">1. HP_ID <span>รหัสทรัพย์สิน</span></label><input id="HP_ID" class="field-input !bg-slate-100" readonly></div>
        <div><label class="field-label">2. Listing Type <span>ประกาศ</span></label><select id="Listing_Type" class="field-input"></select></div>
        <div><label class="field-label">3. Project Name <span>ชื่อโครงการ</span></label>
          <div class="relative flex items-center">
            <input id="Project_Name" class="field-input font-700" placeholder="เลือกโครงการ...">
            <div onclick="document.getElementById('pModal').style.display='flex'" class="absolute right-2 bg-black text-white w-7 h-7 rounded flex items-center justify-center cursor-pointer"><i class="fas fa-list-ul text-[10px]"></i></div>
          </div>
        </div>
        <div><label class="field-label">4. Asset Type <span>ประเภททรัพย์สิน</span></label><select id="Type" class="field-input"></select></div>
        <div><label class="field-label">5. Plot Reference <span>หมายเลขแปลง</span></label><input id="Plot" class="field-input"></div>
        <div><label class="field-label">6. Sales Status <span>สถานะขาย</span></label><select id="Status" class="field-input"></select></div>
        <div class="col-span-full grid grid-cols-1 md:grid-cols-3 gap-4 p-4 bg-gray-50 rounded-xl border">
           <div><label class="field-label text-blue-600">7. Sale Price <span>ราคาขาย</span></label><input type="number" id="Sale_Price" class="field-input" oninput="runCalc()"></div>
           <div><label class="field-label">8. Living Area <span>พื้นที่ใช้สอย</span></label><input type="number" id="Living_Area_sq_m" class="field-input" oninput="runCalc()"></div>
           <div><label class="field-label">9. Price/m2 <span>ราคาต่อ ตร.ม.</span></label><input id="Price_sq_m" class="field-input !bg-slate-100" readonly></div>
           <div class="col-span-full border-t pt-4 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div><label class="field-label">10. Common Fee Rate <span>ค่าส่วนกลาง</span></label><input type="number" id="Common_Fee_Rate" class="field-input" oninput="runCalc()"></div>
            <div><label class="field-label">11. Monthly Fee <span>ต่อเดือน</span></label><input id="Monthly_Common_Fee" class="field-input" readonly></div>
            <div><label class="field-label">12. Yearly Fee <span>ต่อปี</span></label><input id="Common_Fee_Yearly" class="field-input" readonly></div>
          </div>
        </div>
        <div><label class="field-label">13. Land Area (m2) <span>ที่ดิน (ตร.ม.)</span></label><input type="number" id="Land_Area_sq_m" class="field-input"></div>
        <div><label class="field-label">14. Land Area (sq.w) <span>ที่ดิน (ตร.ว.)</span></label><input type="number" id="Land_Area_sq_w" class="field-input"></div>
        <div><label class="field-label">15. Furnishing <span>การตกแต่ง</span></label><select id="Furnishing" class="field-input"></select></div>
        <div><label class="field-label">16. District <span>อำเภอ</span></label><select id="District" class="field-input"></select></div>
        <div><label class="field-label">17. Sub-District <span>ตำบล</span></label><select id="SubDistrict" class="field-input"></select></div>
        <div><label class="field-label">18. Zone <span>โซน</span></label><select id="Zone" class="field-input"></select></div>
        <div><label class="field-label">19. Bedrooms <span>ห้องนอน</span></label><select id="Bedrooms" class="field-input"></select></div>
        <div><label class="field-label">20. Bathrooms <span>ห้องน้ำ</span></label><select id="Bathrooms" class="field-input"></select></div>
        <div><label class="field-label">21. Parking <span>ที่จอดรถ</span></label><select id="Parking" class="field-input"></select></div>
        <div><label class="field-label">22. Kitchen Style <span>สไตล์ครัว</span></label><select id="Kitchen_Type" class="field-input"></select></div>
        <div><label class="field-label">23. Direction <span>ทิศหน้าบ้าน</span></label><select id="Direction" class="field-input"></select></div>
        <div><label class="field-label">24. Electricity <span>ระบบไฟ</span></label><select id="Electricity" class="field-input"></select></div>
        <div><label class="field-label">25. Pool Size <span>ขนาดสระ</span></label><input id="Pool_Size" class="field-input"></div>
        <div><label class="field-label">26. Pool Depth <span>ความลึกสระ</span></label><input id="Pool_Depth" class="field-input"></div>
        <div><label class="field-label">27. Pool System <span>ระบบสระ</span></label><select id="Pool_System" class="field-input"></select></div>
        <div><label class="field-label">28. View Type <span>วิว</span></label><select id="View_Type" class="field-input"></select></div>
        <div><label class="field-label">29. Water Source <span>แหล่งน้ำ</span></label><select id="Water_Source" class="field-input"></select></div>
        <div><label class="field-label">30. Extras <span>สิ่งอำนวยความสะดวก</span></label><select id="Extras" class="field-input"></select></div>
        <div class="col-span-full"><label class="field-label">31. Ownership <span>รูปแบบการถือครอง</span></label><div id="ownership-container" class="grid grid-cols-2 gap-2"></div><input type="hidden" id="Ownership_Type"></div>
        <div><label class="field-label">32. Title Deed <span>โฉนด</span></label><select id="Land_Title_Deed_Type" class="field-input"></select></div>
        <div><label class="field-label">33. Transfer Exp. <span>ค่าโอน</span></label><input id="Transfer_Expenses" class="field-input"></div>
        <div><label class="field-label">34. Badge <span>ป้ายกำกับ</span></label><select id="Badge" class="field-input"></select></div>
        <div><label class="field-label">35. Build Stage <span>สถานะสร้าง</span></label><select id="Build_Stage" class="field-input"></select></div>
        <div><label class="field-label">36. GPS Coordinates <span>พิกัด GPS</span></label><input id="Coordinates" class="field-input"></div>
        <div class="col-span-full"><label class="field-label">37. Description <span>คำบรรยาย</span></label><textarea id="Description" rows="4" class="field-input"></textarea></div>
        <div class="col-span-full bg-slate-100 p-5 rounded-xl border border-dashed"><label class="field-label !text-blue-600 font-800">38. System Status <span>สถานะในระบบ</span></label><select id="System_Status" class="field-input !bg-white"></select></div>
        <div class="col-span-full bg-amber-50 p-5 rounded-xl border border-dashed"><label class="field-label !text-amber-700 font-800">39. Map Visibility <span>การแสดงผลแผนที่</span></label><select id="Map_Visibility" class="field-input !bg-white"><option value="Show">Show Map</option><option value="Hide">Hide Map</option></select></div>
      </div>
    </div>
  </div>

  <div class="save-bar"><button id="btn_save" onclick="saveData()" class="btn-update shadow-xl">PUBLISH UPDATES</button></div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    const hpId = new URLSearchParams(window.location.search).get('id');
    const storage = firebase.initializeApp({ storageBucket: "huahin-properties-5f1b5.firebasestorage.app" }).storage();

    let projectMaster = [], galleryArr = [], thumbUrl = "", selectedUrls = [];

    async function init() {
      if(!hpId) return;
      fetch(API, { method:'POST', body: JSON.stringify({ mode: 'getAddContext' }) })
        .then(r => r.json()).then(res => { if(res.ok) renderMetadata(res.options); });

      fetch(`${API}?mode=getUnitDetail&id=${hpId}`)
        .then(r => r.json()).then(res => { if(res.ok) { fillUnitData(res.data); document.getElementById('loadingOverlay').classList.add('hidden'); } });
    }

    function renderMetadata(meta) {
      projectMaster = meta._raw_projects || [];
      const dds = ["Listing_Type", "Type", "Status", "Furnishing", "District", "SubDistrict", "Zone", "Bedrooms", "Bathrooms", "Parking", "Kitchen_Type", "Direction", "Electricity", "Pool_System", "View_Type", "Water_Source", "Extras", "Land_Title_Deed_Type", "Badge", "Build_Stage", "System_Status"];
      dds.forEach(id => {
        const el = document.getElementById(id);
        if(el && meta[id]) el.innerHTML = '<option value="">-- Select --</option>' + meta[id].map(v => `<option value="${v}">${v}</option>`).join('');
      });
      if(meta.Ownership_Type) {
        document.getElementById('ownership-container').innerHTML = meta.Ownership_Type.map(opt => `
          <label class="flex items-center gap-2 p-3 bg-slate-50 rounded-lg cursor-pointer font-bold text-xs"><input type="checkbox" name="own_check" value="${opt}" class="w-4 h-4"> ${opt}</label>
        `).join('');
      }
      document.getElementById('modal-list').innerHTML = projectMaster.map(p => `<div class="project-opt" onclick="autoFill('${p.name}')">${p.name}</div>`).join('');
    }

    function fillUnitData(u) {
      document.getElementById('displayId').innerText = u.HP_ID;
      Object.keys(u).forEach(k => { const el = document.getElementById(k); if(el) el.value = u[k]; });
      if(u.Ownership_Type) {
        const vals = u.Ownership_Type.split(',').map(s => s.trim());
        document.querySelectorAll('input[name="own_check"]').forEach(cb => { if(vals.includes(cb.value)) cb.checked = true; });
      }
      thumbUrl = u.Thumbnail_Image || ""; renderThumb();
      galleryArr = u.Album_Image ? u.Album_Image.split(',').filter(Boolean) : []; renderGallery();
      runCalc();
    }

    // 🎯 📸 Verified Bulk Delete Engine V12.0
    function renderGallery() { 
        document.getElementById('galleryPreview').innerHTML = galleryArr.map((url, i) => `
            <div class="img-tile ${selectedUrls.includes(url) ? 'tile-selected' : ''}" onclick="toggleSelect('${url}')">
                <div class="img-selected-overlay"></div>
                <div class="${selectedUrls.includes(url) ? 'img-check' : 'img-x'}"><i class="fas ${selectedUrls.includes(url) ? 'fa-check' : 'fa-plus'}"></i></div>
                <img src="${url}" class="w-full h-full object-cover">
            </div>
        `).join(''); 
        document.getElementById('Album_Image').value = galleryArr.join(','); 
        const btn = document.getElementById('btnDeleteSelected');
        btn.style.display = selectedUrls.length > 0 ? 'block' : 'none';
        document.getElementById('selectedCount').innerText = selectedUrls.length;
    }

    function toggleSelect(url) {
      if(selectedUrls.includes(url)) { selectedUrls = selectedUrls.filter(u => u !== url); }
      else { selectedUrls.push(url); }
      renderGallery();
    }

    async function deleteSelectedImages() {
      if(!confirm(`ยืนยันการลบ ${selectedUrls.length} รูปออกจากระบบ?`)) return;
      document.getElementById('loadingOverlay').classList.remove('hidden');
      
      // Step 1: Delete from Firebase
      for(let url of selectedUrls) {
        try { await storage.refFromURL(url).delete(); } catch(e){ console.warn("File already gone or error:", url); }
        galleryArr = galleryArr.filter(u => u !== url);
      }

      // Step 2: Finalize array & Clear selection
      selectedUrls = [];
      renderGallery();

      // Step 3: IMMEDIATE SYNC to Database (Crucial Fix)
      await syncGalleryToDatabase();
      
      document.getElementById('loadingOverlay').classList.add('hidden');
      alert("ลบสำเร็จและบันทึกข้อมูลแล้ว ✅");
    }

    async function syncGalleryToDatabase() {
        const payload = { mode: "updateUnit", HP_ID: hpId, Album_Image: galleryArr.join(',') };
        await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    }

    // 🎯 Cover Image Actions
    function renderThumb() {
        const box = document.getElementById('thumbPreview');
        box.innerHTML = thumbUrl ? `<div class="img-x" onclick="deleteThumb()"><i class="fas fa-times"></i></div><img src="${thumbUrl}" class="w-full h-full object-cover">` : '<i class="fas fa-image text-3xl text-slate-200"></i>';
        document.getElementById('Thumbnail_Image').value = thumbUrl;
    }

    async function deleteThumb() {
        if(!confirm("ลบรูปหน้าปก?")) return;
        document.getElementById('loadingOverlay').classList.remove('hidden');
        try { await storage.refFromURL(thumbUrl).delete(); } catch(e){}
        thumbUrl = ""; renderThumb();
        await fetch(API, { method: 'POST', body: JSON.stringify({ mode: "updateUnit", HP_ID: hpId, Thumbnail_Image: "" }) });
        document.getElementById('loadingOverlay').classList.add('hidden');
    }

    async function handleMediaUpload(input, target) {
      if(!input.files.length) return;
      document.getElementById('loadingOverlay').classList.remove('hidden');
      for (let file of input.files) {
        const path = `properties/${hpId}/${Date.now()}_${file.name}`;
        const ref = storage.ref(path);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        if(target === 'thumb') { thumbUrl = url; renderThumb(); }
        else { galleryArr.push(url); renderGallery(); }
      }
      document.getElementById('loadingOverlay').classList.add('hidden');
    }

    function autoFill(name) {
      const p = projectMaster.find(item => item.name === name);
      if (p) {
        document.getElementById('Project_Name').value = p.name;
        ["District", "SubDistrict", "Coordinates", "Zone", "Type", "Water_Source", "Land_Title_Deed_Type"].forEach(f => {
          if(p[f.toLowerCase()]) document.getElementById(f).value = p[f.toLowerCase()];
        });
      }
      document.getElementById('pModal').style.display = 'none';
    }

    function runCalc() {
      const p = parseFloat(document.getElementById('Sale_Price').value) || 0;
      const a = parseFloat(document.getElementById('Living_Area_sq_m').value) || 1;
      const r = parseFloat(document.getElementById('Common_Fee_Rate').value) || 0;
      document.getElementById('Price_sq_m').value = Math.round(p/a).toLocaleString();
      document.getElementById('Monthly_Common_Fee').value = Math.round(a * r).toLocaleString();
      document.getElementById('Common_Fee_Yearly').value = Math.round(a * r * 12).toLocaleString();
    }

    async function saveData() {
      if(!confirm("บันทึกการแก้ไขทั้งหมด?")) return;
      document.getElementById('btn_save').innerText = "SYNCING...";
      const owns = Array.from(document.querySelectorAll('input[name="own_check"]:checked')).map(c => c.value);
      document.getElementById('Ownership_Type').value = owns.join(', ');
      let payload = { mode: "updateUnit", HP_ID: hpId, Thumbnail_Image: thumbUrl, Album_Image: galleryArr.join(',') };
      document.querySelectorAll('input, select, textarea').forEach(el => { if(el.id) payload[el.id] = el.value; });
      const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(payload) })).json();
      if(res.ok) { alert("SUCCESS! ✅"); location.href='dashboard.html'; }
    }

    function switchTab(t) {
      document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      document.getElementById('btn-' + t).classList.add('active');
    }
    window.onload = init;
  </script>
</body>
</html>

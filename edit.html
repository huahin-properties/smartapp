<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Master Editor V12.1 | HUA HIN PROPERTIES</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

  <style>
    :root { --brand: #262626; --accent: #C9A84C; --bg: #F8FAF8; --danger: #EF4444; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: #1A3017; margin: 0; padding: 0; overflow-x: hidden; }
    header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
    .brand-center { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 800; color: var(--accent); font-size: 0.95rem; text-transform: uppercase; font-family: 'Montserrat'; }

    .content-wrapper { padding: 80px 10px 200px; max-width: 1100px; margin: 0 auto; }
    .edit-banner { background: #262626; border-radius: 0.8rem; padding: 15px 20px; color: white; margin-bottom: 20px; }
    .banner-title { font-size: 1rem; font-weight: 800; color: white; font-family: 'Montserrat'; text-transform: uppercase; }

    .tab-bar { display: flex; gap: 1rem; margin-bottom: 1rem; border-bottom: 1px solid #eee; overflow-x: auto; }
    .tab-btn { padding: 0.8rem 0; font-weight: 800; font-size: 10px; text-transform: uppercase; color: #999; cursor: pointer; position: relative; background: none; border: none; font-family: 'Montserrat'; }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .input-card { background: white; border: 1px solid rgba(0,0,0,0.05); padding: 1rem; border-radius: 1.2rem; margin-bottom: 1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
    .field-label { font-size: 10px; font-weight: 800; color: #999; text-transform: uppercase; margin-bottom: 0.5rem; display: block; font-family: 'Montserrat'; }
    .field-label span { color: #2D5A27; font-size: 10px; margin-left: 5px; font-weight: 700; border-left: 2px solid #eee; padding-left: 8px; font-family: 'Sarabun'; }
    .field-input { width: 100%; background: #F9F9F8; border: 1.5px solid transparent; border-radius: 0.8rem; padding: 0.8rem 1rem; font-size: 14px; outline: none; transition: 0.3s; color: #1A3017; font-weight: 500; }
    .field-input:focus { border-color: var(--accent); background: white; }

    /* 📸 Gallery Layout */
    .gallery-container { background: #fdfdfd; border: 1px dashed #eee; border-radius: 1rem; padding: 0.5rem; display: grid; gap: 0.5rem; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    @media (min-width: 1024px) { .gallery-container { grid-template-columns: repeat(6, minmax(0, 1fr)); } }

    .img-tile { position: relative; aspect-ratio: 1; border-radius: 0.6rem; overflow: hidden; border: 2px solid #f0f0f0; transition: 0.2s; cursor: pointer; }
    .img-tile.selected { border: 4px solid var(--danger); }
    .img-tile.selected::after { content: '\f058'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; top: 4px; right: 4px; color: var(--danger); background: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; z-index: 10; }
    
    .img-x { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: var(--danger); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; border: 2px solid white; z-index: 20; }

    /* 🎯 PDF Section Styles */
    .pdf-row { display: flex; align-items: center; gap: 0.75rem; background: #F9F9F8; padding: 10px 15px; border-radius: 1rem; margin-bottom: 8px; border: 1px solid #eee; }
    .pdf-icon { width: 32px; height: 32px; border-radius: 8px; background: #fee2e2; color: #ef4444; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .btn-pdf-action { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; font-size: 0.8rem; }

    /* 🚨 Modern Confirm Pop-up */
    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
    .confirm-box { background: white; width: 100%; max-width: 320px; border-radius: 1.5rem; padding: 25px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .confirm-box i { font-size: 3rem; color: var(--danger); margin-bottom: 15px; }
    .btn-yes { flex: 1; background: var(--danger); color: white; padding: 12px; border-radius: 0.8rem; font-weight: 800; }
    .btn-no { flex: 1; background: #eee; color: #333; padding: 12px; border-radius: 0.8rem; font-weight: 800; }

    #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #eee; padding: 15px; z-index: 1000; text-align: center; }
    .btn-update { background: #111; color: white; width: 100%; max-width: 600px; height: 50px; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; font-family: 'Montserrat'; }
    .btn-delete-float { position: sticky; top: 70px; background: var(--danger); color: white; width: 100%; padding: 10px; border-radius: 0.8rem; font-weight: 800; text-transform: uppercase; font-size: 10px; margin-bottom: 10px; display: none; z-index: 100; }
  </style>
</head>
<body>

  <div id="confirmPop" class="confirm-overlay">
    <div class="confirm-box">
      <i class="fas fa-trash-alt"></i>
      <h3 style="font-weight:800; margin-bottom:10px;">ยืนยันการลบรูป?</h3>
      <p style="font-size:14px; color:#666; margin-bottom:20px;">คุณต้องการลบรูปภาพจำนวน <span id="countPop">0</span> รูปที่เลือกไว้ออกถาวรหรือไม่?</p>
      <div class="flex gap-3">
        <button class="btn-no" onclick="closeConfirm()">ยกเลิก</button>
        <button class="btn-yes" onclick="executeDelete()">ยืนยันลบทันที</button>
      </div>
    </div>
  </div>

  <div id="loadingOverlay">
    <i class="fas fa-circle-notch animate-spin text-3xl text-amber-500 mb-3"></i>
    <div class="text-[9px] font-800 uppercase tracking-widest text-slate-400">Syncing Master Database...</div>
  </div>

  <header>
    <div onclick="history.back()" style="cursor:pointer; color:var(--accent);"><i class="fas fa-chevron-left text-lg"></i></div>
    <div class="brand-center">Master Editor V12.1</div>
    <div style="width:20px;"></div>
  </header>

  <div class="content-wrapper">
    <div class="edit-banner">
      <div class="banner-title">EDIT MASTER: <span id="displayId">...</span></div>
    </div>
    
    <div class="tab-bar">
      <button id="btn-photo" class="tab-btn active" onclick="switchTab('photo')">Visual Assets</button>
      <button id="btn-info" class="tab-btn" onclick="switchTab('info')">Specifications (39 Items)</button>
    </div>

    <div id="tab-photo" class="tab-content active space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="input-card">
          <span class="field-label">Main Image Cover <span>รูปภาพหน้าปกหลัก</span></span>
          <div id="thumbPreview" class="relative w-full aspect-video rounded-xl bg-slate-50 border-2 border-dashed border-slate-100 flex items-center justify-center overflow-hidden mb-3"></div>
          <button onclick="document.getElementById('f_thumb').click()" class="btn-blue w-full py-2 bg-blue-600 text-white rounded-lg">UPDATE COVER</button>
          <input type="file" id="f_thumb" class="hidden" accept="image/*" onchange="handleMediaUpload(this, 'thumb')">
          <input type="hidden" id="Thumbnail_Image">
        </div>
        
        <div class="input-card">
          <div class="flex justify-between items-center mb-2">
            <span class="field-label">Visual Gallery <span>อัลบั้มรูปภาพ</span></span>
            <button id="btnDelAlbum" onclick="openConfirm()" class="btn-delete-float">ลบรูปที่เลือก (<span id="countSelected">0</span>)</button>
          </div>
          <div id="galleryPreview" class="gallery-container mb-3"></div>
          <button onclick="document.getElementById('f_gallery').click()" class="w-full py-3 bg-purple-600 text-white rounded-xl font-800 text-[10px] uppercase">ADD TO ALBUM</button>
          <input type="file" id="f_gallery" class="hidden" multiple accept="image/*" onchange="handleMediaUpload(this, 'album')">
          <input type="hidden" id="Album_Image">
        </div>
      </div>

      <div class="input-card">
        <span class="field-label">Master Documents (PDF) <span>จัดการไฟล์เอกสาร</span></span>
        <div class="space-y-2 mt-3">
          <div class="pdf-row">
             <div class="pdf-icon"><i class="fas fa-file-pdf"></i></div>
             <div class="flex-1 font-800 text-[9px] text-slate-400 uppercase">Floor Plan: <span id="txt-FloorPlan_PDF" class="text-slate-700 font-normal">None</span></div>
             <div class="flex gap-2">
               <button onclick="document.getElementById('f_floor').click()" class="btn-pdf-action bg-blue-600 text-white"><i class="fas fa-upload"></i></button>
               <button onclick="deletePhysicalFile('FloorPlan_PDF')" id="del_floor" class="btn-pdf-action bg-red-50 text-red-500 hidden"><i class="fas fa-trash"></i></button>
             </div>
             <input type="file" id="f_floor" class="hidden" accept=".pdf" onchange="handleMediaUpload(this, 'pdf', 'FloorPlan_PDF')"><input type="hidden" id="FloorPlan_PDF">
          </div>
          <div class="pdf-row">
             <div class="pdf-icon"><i class="fas fa-file-pdf"></i></div>
             <div class="flex-1 font-800 text-[9px] text-slate-400 uppercase">Brochure: <span id="txt-Customer_PDF" class="text-slate-700 font-normal">None</span></div>
             <div class="flex gap-2">
               <button onclick="document.getElementById('f_customer').click()" class="btn-pdf-action bg-blue-600 text-white"><i class="fas fa-upload"></i></button>
               <button onclick="deletePhysicalFile('Customer_PDF')" id="del_customer" class="btn-pdf-action bg-red-50 text-red-500 hidden"><i class="fas fa-trash"></i></button>
             </div>
             <input type="file" id="f_customer" class="hidden" accept=".pdf" onchange="handleMediaUpload(this, 'pdf', 'Customer_PDF')"><input type="hidden" id="Customer_PDF">
          </div>
        </div>
      </div>
    </div>

    <div id="tab-info" class="tab-content space-y-4">
      <div class="input-card grid grid-cols-1 md:grid-cols-3 gap-6">
        <div><label class="field-label">1. HP_ID <span>รหัสทรัพย์สิน</span></label><input id="HP_ID" class="field-input" readonly></div>
        <div><label class="field-label">2. Listing Type <span>ประกาศ</span></label><select id="Listing_Type" class="field-input"></select></div>
        <div><label class="field-label">3. Project Name <span>ชื่อโครงการ</span></label><input id="Project_Name" class="field-input"></div>
        </div>
    </div>
  </div>

  <div class="save-bar"><button onclick="saveData()" class="btn-update shadow-xl">PUBLISH UPDATES</button></div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    const hpId = new URLSearchParams(window.location.search).get('id');
    const firebaseConfig = { storageBucket: "huahin-properties-5f1b5.firebasestorage.app" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();

    let galleryArr = [], thumbUrl = "", selectedForDelete = [];

    async function init() {
      document.getElementById('loadingOverlay').style.display = 'flex';
      fetch(`${API}?mode=getUnitDetail&id=${hpId}`)
        .then(r => r.json()).then(res => { 
          if(res.ok) fillData(res.data);
          document.getElementById('loadingOverlay').style.display = 'none';
        });
    }

    function fillData(u) {
      document.getElementById('displayId').innerText = u.HP_ID;
      Object.keys(u).forEach(k => { const el = document.getElementById(k); if(el) el.value = u[k]; });
      thumbUrl = u.Thumbnail_Image || ""; renderThumb();
      galleryArr = u.Album_Image ? u.Album_Image.split(',').filter(Boolean) : []; renderGallery();
      
      if(u.FloorPlan_PDF) { document.getElementById('txt-FloorPlan_PDF').innerText = "Current File ✅"; document.getElementById('del_floor').classList.remove('hidden'); }
      if(u.Customer_PDF) { document.getElementById('txt-Customer_PDF').innerText = "Current File ✅"; document.getElementById('del_customer').classList.remove('hidden'); }
    }

    // 📸 Cover Management (ลบได้จริงเหมือนหน้าปกที่คุณชม)
    function renderThumb() {
      const box = document.getElementById('thumbPreview');
      box.innerHTML = thumbUrl ? `<div class="img-x" onclick="deleteThumb()">✕</div><img src="${thumbUrl}" class="w-full h-full object-cover">` : '<i class="fas fa-image text-3xl text-slate-200"></i>';
      document.getElementById('Thumbnail_Image').value = thumbUrl;
    }
    async function deleteThumb() {
      if(!confirm("ลบรูปหน้าปกถาวร?")) return;
      try { await storage.refFromURL(thumbUrl).delete(); } catch(e){}
      thumbUrl = ""; renderThumb();
    }

    // 📸 🎯 Fixed Album Engine (ลบได้จริง 100%)
    function renderGallery() {
      const container = document.getElementById('galleryPreview');
      container.innerHTML = galleryArr.map((url, i) => `
        <div class="img-tile" id="tile-${i}" onclick="toggleSelect('${url}', ${i})">
          <img src="${url}" class="w-full h-full object-cover">
        </div>
      `).join('');
      document.getElementById('Album_Image').value = galleryArr.join(',');
      updateDelUI();
    }

    function toggleSelect(url, i) {
      const tile = document.getElementById(`tile-${i}`);
      if (selectedForDelete.includes(url)) {
        selectedForDelete = selectedForDelete.filter(u => u !== url);
        tile.classList.remove('selected');
      } else {
        selectedForDelete.push(url);
        tile.classList.add('selected');
      }
      updateDelUI();
    }

    function updateDelUI() {
      const btn = document.getElementById('btnDelAlbum');
      btn.style.display = selectedForDelete.length > 0 ? 'block' : 'none';
      document.getElementById('countSelected').innerText = selectedForDelete.length;
    }

    function openConfirm() {
      document.getElementById('countPop').innerText = selectedForDelete.length;
      document.getElementById('confirmPop').style.display = 'flex';
    }
    function closeConfirm() { document.getElementById('confirmPop').style.display = 'none'; }

    // 🎯 หัวใจสำคัญ: ลบทั้งใน Storage และตัด URL ออกจาก Array ทันที
    async function executeDelete() {
      closeConfirm();
      document.getElementById('loadingOverlay').style.display = 'flex';
      
      for (let url of selectedForDelete) {
        try {
          const ref = storage.refFromURL(url);
          await ref.delete();
          // ตัด URL ที่ลบทิ้งออกจาก Array หลัก
          galleryArr = galleryArr.filter(item => item !== url);
        } catch (e) { 
          console.error("File already gone or error: ", url);
          // ยังคงต้องกรองออกเพื่อให้หน้าจออัปเดต
          galleryArr = galleryArr.filter(item => item !== url);
        }
      }

      selectedForDelete = [];
      renderGallery(); // วาดแกลเลอรีใหม่ รูปที่ถูกลบจะหายไปทันที
      document.getElementById('loadingOverlay').style.display = 'none';
      alert("ลบรูปภาพที่เลือกเรียบร้อยแล้ว ✅ (กด Publish เพื่อบันทึกการเปลี่ยนแปลงลง Sheets)");
    }

    // PDF Delete
    async function deletePhysicalFile(fieldId) {
      let url = document.getElementById(fieldId).value;
      if(!url || !confirm("ลบไฟล์เอกสารนี้ถาวร?")) return;
      try { await storage.refFromURL(url).delete(); } catch(e){}
      document.getElementById(fieldId).value = ""; 
      document.getElementById('txt-'+fieldId).innerText = "None"; 
      document.getElementById(fieldId === 'FloorPlan_PDF' ? 'del_floor' : 'del_customer').classList.add('hidden');
    }

    async function handleMediaUpload(input, target, fieldId) {
      if(!input.files.length) return;
      document.getElementById('loadingOverlay').style.display = 'flex';
      for (let file of input.files) {
        const path = `properties/${hpId}/${Date.now()}_${file.name}`;
        const ref = storage.ref(path);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        if(target === 'thumb') { thumbUrl = url; renderThumb(); }
        else if(target === 'album') { galleryArr.push(url); }
        else if(fieldId) { 
           document.getElementById(fieldId).value = url; 
           document.getElementById('txt-'+fieldId).innerText = "Uploaded ✅";
           document.getElementById(fieldId === 'FloorPlan_PDF' ? 'del_floor' : 'del_customer').classList.remove('hidden');
        }
      }
      if(target === 'album') renderGallery();
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    async function saveData() {
      document.getElementById('loadingOverlay').style.display = 'flex';
      const payload = { mode: "updateUnit", HP_ID: hpId, Thumbnail_Image: thumbUrl, Album_Image: galleryArr.join(',') };
      document.querySelectorAll('input, select, textarea').forEach(el => { if(el.id) payload[el.id] = el.value; });
      const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(payload) })).json();
      if(res.ok) { alert("บันทึกการเปลี่ยนแปลงสำเร็จ ✅"); location.href='dashboard.html'; }
    }

    function switchTab(t) {
      document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      document.getElementById('btn-' + t).classList.add('active');
    }
    window.onload = init;
  </script>
</body>
</html>

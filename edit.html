<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Master Editor V3.6 | HUA HIN PROPERTIES</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --brand: #262626; --accent: #C9A84C; --bg: #F8FAF8; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: #1A3017; margin: 0; padding: 0; }
    
    /* 🎯 Header - ปรับให้ชื่ออยู่กลาง ปุ่มเมนูอยู่ซ้าย */
    header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
    .brand-center { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 800; color: var(--accent); font-size: 0.95rem; text-transform: uppercase; font-family: 'Montserrat', sans-serif; }
    
    .menu-trigger { display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; font-family: 'Montserrat', sans-serif; }
    .menu-trigger i { font-size: 1.1rem; color: var(--accent); }
    .menu-trigger span { font-size: 8px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-top: 1px; }

    /* 🎯 Sidebar */
    .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #262626; z-index: 2000; transition: 0.4s; padding: 60px 20px; font-family: 'Montserrat', sans-serif; }
    .sidebar.active { left: 0; }
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1999; display: none; }
    .sidebar-overlay.active { display: block; }
    .menu-item { display: flex; align-items: center; gap: 15px; padding: 15px; color: white; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; font-weight: 600; }
    .menu-item i { color: var(--accent); width: 20px; text-align: center; }

    .content-wrapper { padding: 80px 20px 200px; max-width: 1240px; margin: 0 auto; }
    .tab-bar { display: flex; gap: 2rem; margin-bottom: 2rem; border-bottom: 2px solid #eee; }
    .tab-btn { padding: 1rem 0; font-weight: 800; font-size: 11px; text-transform: uppercase; color: #999; cursor: pointer; position: relative; background: none; border: none; transition: 0.3s; }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background: var(--accent); border-radius: 10px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .input-card { background: white; border: 1px solid rgba(0,0,0,0.05); padding: 2.2rem; border-radius: 2.2rem; margin-bottom: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.02); }
    .field-label { font-size: 11px; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 0.6rem; display: block; }
    .field-input { width: 100%; background: #F9F9F8; border: 1.5px solid transparent; border-radius: 1rem; padding: 1rem; font-size: 15px; outline: none; transition: 0.3s; }
    .field-input:focus { border-color: var(--brand); background: white; }
    .save-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.98); border-top: 1px solid #eee; padding: 25px 20px; z-index: 1000; text-align: center; }
    .btn-update { background: var(--brand); color: white; width: 100%; max-width: 800px; height: 70px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 20px; }
    .mini-status { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--accent); display: none; margin-top: 5px; }
    .mini-status.active { display: flex; align-items: center; gap: 5px; }
    .img-tile { position: relative; aspect-ratio: 1; border-radius: 1rem; overflow: hidden; border: 1px solid #eee; }
    .img-x { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; background: rgba(239,68,68,0.9); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; border: 2px solid white; font-size: 10px; }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
  <div class="sidebar" id="sidebar">
    <div style="color:var(--accent); font-weight:800; margin-bottom:30px; font-size:1rem; border-bottom:2px solid var(--accent); padding-bottom:10px;">EDITOR MENU</div>
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i> HOME CATALOG</a>
    <a href="dashboard.html" class="menu-item"><i class="fas fa-chart-line"></i> BACK TO DASHBOARD</a>
    <a href="#" onclick="handleLogout()" class="menu-item" style="color:#EF4444; margin-top:20px;"><i class="fas fa-sign-out-alt"></i> SIGN OUT</a>
  </div>

  <header>
    <div class="menu-trigger" onclick="toggleMenu()">
      <i class="fas fa-bars"></i>
      <span>MENU</span>
    </div>
    <div class="brand-center">Master Editor</div>
    <div style="width:40px;"></div>
  </header>

  <div class="content-wrapper">
    <div class="tab-bar">
      <button id="btn-photo" class="tab-btn active" onclick="switchTab('photo')">Visual Assets</button>
      <button id="btn-info" class="tab-btn" onclick="switchTab('info')">Specifications</button>
    </div>

    <div id="tab-photo" class="tab-content active space-y-6">
      <div class="input-card">
        <span class="field-label">Main Image Cover</span>
        <div id="thumbPreview" class="relative w-full aspect-video rounded-2xl bg-slate-50 border-2 border-dashed border-slate-200 flex items-center justify-center overflow-hidden">
          <i class="fas fa-cloud-upload-alt text-4xl text-slate-200"></i>
        </div>
        <button onclick="document.getElementById('file_thumb').click()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-800 mt-4 text-xs">UPDATE COVER</button>
        <div id="status_thumb" class="mini-status"><i class="fas fa-circle-notch animate-spin"></i> Syncing...</div>
        <input type="file" id="file_thumb" class="hidden" accept="image/*" onchange="handleUpload(this, 'thumb')"><input type="hidden" id="Thumbnail_Image">
      </div>
      <div class="input-card">
        <span class="field-label">Visual Gallery</span>
        <div id="galleryPreview" class="h-48 bg-slate-50 rounded-2xl p-3 grid grid-cols-4 gap-2 overflow-y-auto mb-3"></div>
        <button onclick="document.getElementById('file_gallery').click()" class="w-full py-4 bg-purple-600 text-white rounded-xl font-800 text-xs">ADD VISUALS</button>
        <div id="status_album" class="mini-status"><i class="fas fa-circle-notch animate-spin"></i> Syncing...</div>
        <input type="file" id="file_gallery" class="hidden" multiple accept="image/*" onchange="handleUpload(this, 'album')"><input type="hidden" id="Album_Image">
      </div>
    </div>

    <div id="tab-info" class="tab-content space-y-6">
        <div class="input-card grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="field-label">HP_ID</label><input id="HP_ID" class="field-input" readonly></div>
            <div><label class="field-label">Plot</label><input id="Plot" class="field-input"></div>
            <div><label class="field-label">Sale Price</label><input type="number" id="Sale_Price" class="field-input"></div>
            <div><label class="field-label">System Status</label><select id="System_Status" class="field-input dynamic-opt"></select></div>
        </div>
    </div>
  </div>

  <div class="save-bar"><button id="btn_save" onclick="saveData()" class="btn-update shadow-2xl">PUBLISH UPDATES</button></div>

  <script>
    (function(){ if(localStorage.getItem('admin_session') !== 'active'){ window.location.href="gateway.html"; } })();
    const API = "https://script.google.com/macros/s/AKfycbyOnZc6s05eGvHR5XmRnRPAat8vNZpf8cFhL2GiAFjWld-2OBf2OqgP07RU07UTZgDXxA/exec";
    const hpId = new URLSearchParams(window.location.search).get('id');
    let gallery = [], thumbUrl = "";

    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('active');
      document.getElementById('overlay').classList.toggle('active');
    }

    function handleLogout() { localStorage.clear(); location.href="gateway.html"; }

    async function init() {
      if (!hpId) return;
      try {
        const metaRes = await (await fetch(API, { method:'POST', body: JSON.stringify({ mode: 'getMetadata' }) })).json();
        if (metaRes.ok) {
          document.querySelectorAll('select.dynamic-opt').forEach(el => {
            const options = metaRes.data[el.id] || [];
            el.innerHTML = `<option value="">-- Select --</option>` + options.map(v => `<option value="${v}">${v}</option>`).join('');
          });
        }
        const unitRes = await (await fetch(`${API}?mode=getUnitDetail&id=${hpId}`)).json();
        if (unitRes.ok) {
          const u = unitRes.data;
          Object.keys(u).forEach(k => { const el = document.getElementById(k); if (el) el.value = u[k]; });
          thumbUrl = u.Thumbnail_Image || ""; renderMainThumb(thumbUrl);
          gallery = u.Album_Image ? u.Album_Image.split(',').filter(Boolean) : []; renderGallery();
        }
      } catch (e) { console.error(e); }
    }

    async function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image(); img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas'); const MAX_WIDTH = 1200;
            let width = img.width, height = img.height;
            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
          };
        };
      });
    }

    async function handleUpload(input, target) {
      if(!input.files.length) return;
      const statusEl = document.getElementById(`status_${target === 'album' ? 'album' : 'thumb'}`);
      if(statusEl) statusEl.classList.add('active');
      for (let f of input.files) {
        const base64 = await compressImage(f);
        const res = await (await fetch(API, { method:'POST', body: JSON.stringify({ mode:'uploadFile', target, hpId: hpId, data: base64, type: f.type, name: f.name }) })).json();
        if(res.ok) {
          if(target === 'thumb') { thumbUrl = res.url; renderMainThumb(thumbUrl); }
          else { gallery.push(res.url); renderGallery(); }
        }
      }
      if(statusEl) statusEl.classList.remove('active');
    }

    function renderMainThumb(url) {
      const box = document.getElementById('thumbPreview');
      box.innerHTML = url ? `<img src="${url}" class="w-full h-full object-cover">` : `<i class="fas fa-cloud-upload-alt text-4xl text-slate-200"></i>`;
      document.getElementById('Thumbnail_Image').value = url;
    }

    function renderGallery() {
      const box = document.getElementById('galleryPreview');
      box.innerHTML = gallery.map((url) => `<div class="img-tile"><img src="${url}" class="w-full h-full object-cover"></div>`).join('');
      document.getElementById('Album_Image').value = gallery.join(',');
    }

    async function saveData() {
      document.getElementById('btn_save').innerText = "SAVING...";
      const p = { mode: "updateUnit", HP_ID: hpId, Thumbnail_Image: thumbUrl, Album_Image: gallery.join(',') };
      document.querySelectorAll('input, select, textarea').forEach(el => { if(el.id) p[el.id] = el.value; });
      const res = await (await fetch(API, { method: 'POST', body: JSON.stringify(p) })).json();
      if(res.ok) { alert("SUCCESS!"); location.href='dashboard.html'; }
    }

    function switchTab(t) {
      document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      document.getElementById('btn-' + t).classList.add('active');
    }
    window.onload = init;
  </script>
</body>
</html>
